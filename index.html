/* Kanban */
.kanban-scroll{overflow-x:auto;padding-bottom:12px;}
.kanban-board{display:flex;gap:16px;min-width:max-content;}
.kanban-col{width:210px;min-height:300px;}

/* Animations */
.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.slide-up{animation:slideUp .3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.slide-down{animation:slideDown .3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;}}
.modal-up{animation:modalUp .3s cubic-bezier(.32,0,.67,0) reverse, modalUp .3s cubic-bezier(.33,1,.68,1);}
@keyframes modalUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:none;}}

/* Interactions */
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #14b8a6;}
.card-hover{transition:box-shadow .15s;}
@media(hover:hover){.card-hover:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);}}
button:active{opacity:.75;}

/* Utility */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}

/* ── MOBILE LAYOUT ── */
@media(max-width:767px){
  /* Bottom nav */
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;

  const map={};
  (iRows||[]).forEach(r=>{const k=s(r[0]);if(!map[k])map[k]=[];map[k].push({id:nid(),desc:s(r[2]),cant:n(r[3]),precio:n(r[4])});});
  return (pRows||[]).map(r=>({id:nid(),numero:s(r[0]),clienteNombre:s(r[1]),fecha:s(r[2]),vencimiento:s(r[3]),estado:s(r[4])||'Borrador',items:map[s(r[0])]||[{id:nid(),desc:'',cant:1,precio:0}],condPago:s(r[7])}));
}
function parseSheets(d){
  return{
    clientes:(d.Clientes||[]).map(fromRC),
    leads:(d.Leads||[]).map(fromRL),
    presupuestos:fromRPptos(d.Presupuestos,d.Items_Presupuesto),
    obras:(d.Obras||[]).map(fromRO),
    tareas:(d.Tareas||[]).map(fromRT),
    lastModified:d._lastModified||'',
  };
}
async function sheetsLoad(url){
  const r=await fetch(url+'?t='+Date.now());
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Error');
  return parseSheets(j.data);
}
async function sheetsSetup(url){
  const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'setup'})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
  return j;
}
async function sheetsSave(url,clientes,leads,presupuestos,obras,tareas){
  const items=presupuestos.flatMap(p=>(p.items||[]).map((it,i)=>toRowItem(p.numero,it,i)));
  const ts=new Date().toISOString();
  const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'save',timestamp:ts,data:{
    Clientes:clientes.map(toRowCliente),
    Leads:leads.map(toRowLead),
    Presupuestos:presupuestos.map(toRowPpto),
    Items_Presupuesto:items,
    Obras:obras.map(toRowObra),
    Tareas:tareas.map(toRowTarea),
  }})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
  return ts;
}

  }
  return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">

          <input value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&connect()} placeholder="https://script.google.com/macros/s/..." className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-white focus:border-teal-400 focus:outline-none"/>

function SyncBar({status,lastSync,pendingCount,onSave,onDisconnect}){
  const cfgs={

    pending: {dot:"bg-amber-400",bg:"bg-amber-50 border-amber-200",txt:"text-amber-800",msg:`${pendingCount} cambio(s) sin guardar`},
    error:   {dot:"bg-red-400",bg:"bg-red-50 border-red-200",txt:"text-red-800",msg:"Error al guardar · Verificá tu conexión"},
  };
  const c=cfgs[status]||cfgs.idle;

  );
}

          <FS label="Etiqueta" opts={ETIQ_CLI} value={form.etiqueta} onChange={e=>setForm({...form,etiqueta:e.target.value})}/>
          <div className="col-span-2"><FT label="Notas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-end"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
      </Modal>}
    </div>

}

/* ─── LEADS ─── */
function Leads({leads,setLeads}){
  const [modal,setModal]=useState(null);
  const [vista,setVista]=useState('kanban');
  const [mobCol,setMobCol]=useState(0);
  const isMobile=useIsMobile();
  const empty={clienteNombre:'',telefono:'',origen:'WhatsApp',producto:PRODUCTOS[0],etapa:'Nuevo contacto',fechaSeguimiento:'',notas:'',valor:''};
  const [form,setForm]=useState(empty);
  function save(){if(!form.clienteNombre.trim())return;const d={...form,valor:n(form.valor)};if(modal==='add')setLeads(p=>[...p,{...d,id:nid(),creado:hoy()}]);else setLeads(p=>p.map(l=>l.id===modal.id?{...l,...d}:l));setModal(null);}
  function del(id){if(confirm('¿Eliminar lead?'))setLeads(p=>p.filter(l=>l.id!==id));}
  function avanzar(id){setLeads(p=>p.map(l=>{if(l.id!==id)return l;const i=ETAPAS.indexOf(l.etapa);return i<ETAPAS.length-1?{...l,etapa:ETAPAS[i+1]}:l;}));}
  function retroceder(id){setLeads(p=>p.map(l=>{if(l.id!==id)return l;const i=ETAPAS.indexOf(l.etapa);return i>0?{...l,etapa:ETAPAS[i-1]}:l;}));}
  const activos=leads.filter(l=>!["Ganado","Perdido"].includes(l.etapa));

  const KanbanCard=({l,etapa})=>(
    <div className="bg-white border border-slate-100 rounded-xl p-3 cursor-pointer card-hover" onClick={()=>{setForm({...l,valor:String(l.valor||'')});setModal(l);}}>
      <p className="font-semibold text-slate-800 text-sm">{l.clienteNombre}</p>
      <p className="text-xs text-slate-500 mt-0.5">{l.producto}</p>
      {l.valor>0&&<p className="text-sm font-bold text-teal-700 mt-1">{pesos(l.valor)}</p>}
      <Badge text={l.origen} cls="bg-slate-100 text-slate-500 mt-1.5"/>
      {l.fechaSeguimiento&&<p className="text-xs text-slate-400 mt-1.5">📅 {l.fechaSeguimiento}</p>}
      {!["Ganado","Perdido"].includes(etapa)&&<div className="flex gap-2 mt-2 pt-2 border-t border-slate-50">
        {ETAPAS.indexOf(etapa)>0&&<button onClick={e=>{e.stopPropagation();retroceder(l.id);}} className="text-xs text-slate-400 hover:text-slate-700 py-1 px-2">◀ Atrás</button>}
        <button onClick={e=>{e.stopPropagation();avanzar(l.id);}} className="text-xs text-teal-600 hover:text-teal-800 font-semibold ml-auto py-1 px-2">Avanzar ▶</button>
      </div>}
    </div>
  );

  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Leads</h2><p className="text-slate-500 text-sm">{activos.length} activos · {pesos(activos.reduce((s,l)=>s+(l.valor||0),0))} pipeline</p></div>
        <div className="flex gap-2">
          {!isMobile&&<div className="flex bg-white border border-slate-200 rounded-lg overflow-hidden">
            <button onClick={()=>setVista('kanban')} className={`px-3 py-1.5 text-sm transition ${vista==='kanban'?'bg-teal-600 text-white':'text-slate-600'}`}>Kanban</button>
            <button onClick={()=>setVista('lista')} className={`px-3 py-1.5 text-sm transition ${vista==='lista'?'bg-teal-600 text-white':'text-slate-600'}`}>Lista</button>
          </div>}
          <Btn onClick={()=>{setForm(empty);setModal('add');}}>+ Nuevo</Btn>
        </div>
      </div>

      {/* ── MOBILE KANBAN: column selector tabs ── */}
      <div className="kanban-mobile-selector mb-3">
        {ETAPAS.map((etapa,i)=>{
          const cnt=leads.filter(l=>l.etapa===etapa).length;
          return <button key={etapa} onClick={()=>setMobCol(i)} className={`flex-shrink-0 px-3 py-2 rounded-full text-xs font-semibold border transition ${mobCol===i?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>
            {etapa} {cnt>0&&<span className={`ml-1 ${mobCol===i?'text-teal-200':'text-slate-400'}`}>{cnt}</span>}
          </button>;
        })}
      </div>
      <div className="kanban-mobile-col">
        {(()=>{
          const etapa=ETAPAS[mobCol];
          const col=leads.filter(l=>l.etapa===etapa);
          const colV=col.reduce((s,l)=>s+(l.valor||0),0);
          return <div>
            {colV>0&&<p className="text-xs text-slate-400 mb-3">{pesos(colV)} en esta etapa</p>}
            <div className="space-y-3">
              {col.map(l=><KanbanCard key={l.id} l={l} etapa={etapa}/>)}
              {col.length===0&&<div className="border-2 border-dashed border-slate-100 rounded-xl h-24 flex items-center justify-center"><span className="text-slate-300 text-sm">Sin leads en esta etapa</span></div>}
            </div>
          </div>;
        })()}
      </div>

      {/* ── DESKTOP KANBAN ── */}
      <div className="kanban-desktop">
        {(vista==='kanban')?(
          <div className="kanban-scroll"><div className="kanban-board">
            {ETAPAS.map(etapa=>{
              const col=leads.filter(l=>l.etapa===etapa);
              const colV=col.reduce((s,l)=>s+(l.valor||0),0);
              return <div key={etapa} className="kanban-col">
                <div className="mb-3 px-1">
                  <div className="flex items-center justify-between"><span className="text-xs font-bold uppercase tracking-wider text-slate-600">{etapa}</span><span className="text-xs bg-slate-200 text-slate-600 rounded-full px-2 py-0.5">{col.length}</span></div>
                  {colV>0&&<div className="text-xs text-slate-400 mt-0.5">{pesos(colV)}</div>}
                </div>
                <div className="space-y-3">
                  {col.map(l=><KanbanCard key={l.id} l={l} etapa={etapa}/>)}
                  {col.length===0&&<div className="border-2 border-dashed border-slate-100 rounded-xl h-16 flex items-center justify-center"><span className="text-slate-300 text-xs">Vacío</span></div>}
                </div>
              </div>;
            })}
          </div></div>
        ):(
          <div className="space-y-3">{leads.map(l=>(
            <div key={l.id} className="bg-white border border-slate-100 rounded-xl p-4 card-hover cursor-pointer" onClick={()=>{setForm({...l,valor:String(l.valor||'')});setModal(l);}}>
              <div className="flex items-start justify-between gap-3">
                <div><div className="flex items-center gap-2 flex-wrap mb-1"><p className="font-semibold text-slate-800">{l.clienteNombre}</p><Badge text={l.etapa} cls={C.etapa[l.etapa]}/><Badge text={l.origen} cls="bg-slate-100 text-slate-500"/></div><p className="text-sm text-slate-500">{l.producto}</p>{l.fechaSeguimiento&&<p className="text-xs text-slate-400 mt-1">📅 {l.fechaSeguimiento}</p>}</div>
                {l.valor>0&&<p className="text-lg font-bold text-teal-700 flex-shrink-0">{pesos(l.valor)}</p>}
              </div>
            </div>
          ))}</div>
        )}
      </div>

      {modal&&<Modal title={modal==='add'?'Nuevo lead':'Editar lead'} onClose={()=>setModal(null)}>
        <div className="grid grid-cols-2 gap-x-4">
          <FI label="Nombre del contacto *" value={form.clienteNombre} onChange={e=>setForm({...form,clienteNombre:e.target.value})}/>
          <FI label="Teléfono" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})}/>
          <FS label="Origen" opts={ORIGENES} value={form.origen} onChange={e=>setForm({...form,origen:e.target.value})}/>
          <FS label="Producto" opts={PRODUCTOS} value={form.producto} onChange={e=>setForm({...form,producto:e.target.value})}/>
          <FS label="Etapa" opts={ETAPAS} value={form.etapa} onChange={e=>setForm({...form,etapa:e.target.value})}/>
          <FI label="Valor ($)" type="number" value={form.valor} onChange={e=>setForm({...form,valor:e.target.value})}/>
          <div className="col-span-2"><FI label="Fecha seguimiento" type="date" value={form.fechaSeguimiento} onChange={e=>setForm({...form,fechaSeguimiento:e.target.value})}/></div>
          <div className="col-span-2"><FT label="Notas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-between">
          {modal!=='add'&&<Btn variant="danger" onClick={()=>{del(modal.id);setModal(null);}}>Eliminar</Btn>}
          <div className="flex gap-3 ml-auto"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

/* ─── PRESUPUESTOS ─── */
function Presupuestos({presupuestos,setPresupuestos}){
  const [modal,setModal]=useState(null);
  const [filtro,setFiltro]=useState('todos');
  function ef(pp){return{numero:nnum(pp),clienteNombre:'',fecha:hoy(),vencimiento:enDias(14),estado:'Borrador',items:[{id:nid(),desc:'',cant:1,precio:0}],condPago:'Transferencia bancaria'};}
  const [form,setForm]=useState(()=>ef(presupuestos));
  const filtered=presupuestos.filter(p=>filtro==='todos'||p.estado===filtro);
  function save(){if(!form.clienteNombre.trim())return;if(modal==='add')setPresupuestos(p=>[...p,{...form,id:nid()}]);else setPresupuestos(p=>p.map(pp=>pp.id===modal.id?{...pp,...form}:pp));setModal(null);}
  function del(id){if(confirm('¿Eliminar presupuesto?'))setPresupuestos(p=>p.filter(pp=>pp.id!==id));}
  function dup(p){setPresupuestos(prev=>[{...p,id:nid(),numero:nnum([...prev,{}]),fecha:hoy(),vencimiento:enDias(14),estado:'Borrador',items:p.items.map(i=>({...i,id:nid()}))}, ...prev]);}
  function addItem(){setForm(f=>({...f,items:[...f.items,{id:nid(),desc:'',cant:1,precio:0}]}));}
  function remItem(id){setForm(f=>({...f,items:f.items.filter(i=>i.id!==id)}));}
  function updItem(id,k,v){setForm(f=>({...f,items:f.items.map(i=>i.id===id?{...i,[k]:k==='desc'?v:n(v)}:i)}));}
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Presupuestos</h2><p className="text-slate-500 text-sm">{presupuestos.length} presupuestos</p></div>
        <Btn onClick={()=>{setForm(ef(presupuestos));setModal('add');}}>+ Nuevo presupuesto</Btn>
      </div>
      <div className="flex gap-2 mb-5 flex-wrap">
        {['todos',...EST_PPTO].map(e=>{const cnt=e==='todos'?presupuestos.length:presupuestos.filter(p=>p.estado===e).length;return cnt>0?<button key={e} onClick={()=>setFiltro(e)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${filtro===e?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>{e==='todos'?'Todos':e} ({cnt})</button>:null;})}
      </div>
      <div className="space-y-3">{filtered.map(p=>(
        <div key={p.id} className="bg-white border border-slate-100 rounded-xl p-4 card-hover cursor-pointer" onClick={()=>{setForm({...p,items:p.items.map(i=>({...i}))});setModal(p);}}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1"><span className="text-xs font-mono text-slate-400">{p.numero}</span><Badge text={p.estado} cls={C.ppto[p.estado]}/></div>
              <p className="font-semibold text-slate-800">{p.clienteNombre}</p>
              <p className="text-xs text-slate-400 mt-1">📅 {p.fecha} → Vence: {p.vencimiento} · {p.condPago}</p>
            </div>
            <div className="text-right flex-shrink-0">
              <p className="text-xl font-bold text-teal-700">{pesos(totalP(p))}</p>
              <div className="flex gap-2 mt-1 justify-end">
                <button onClick={e=>{e.stopPropagation();dup(p);}} className="text-xs text-slate-400 hover:text-slate-700">Duplicar</button>
                <button onClick={e=>{e.stopPropagation();del(p.id);}} className="text-xs text-red-400 hover:text-red-600">Borrar</button>
              </div>
            </div>
          </div>
        </div>
      ))}
      {filtered.length===0&&<div className="text-center py-16 text-slate-400">No hay presupuestos.</div>}
      </div>
      {modal&&<Modal title={modal==='add'?'Nuevo presupuesto':`Presupuesto ${form.numero}`} onClose={()=>setModal(null)} size="lg">
        <div className="grid grid-cols-2 gap-x-4">
          <FI label="Número" value={form.numero} onChange={e=>setForm({...form,numero:e.target.value})}/>
          <FS label="Estado" opts={EST_PPTO} value={form.estado} onChange={e=>setForm({...form,estado:e.target.value})}/>
          <div className="col-span-2"><FI label="Cliente *" value={form.clienteNombre} onChange={e=>setForm({...form,clienteNombre:e.target.value})}/></div>
          <FI label="Fecha emisión" type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/>
          <FI label="Vencimiento" type="date" value={form.vencimiento} onChange={e=>setForm({...form,vencimiento:e.target.value})}/>
          <div className="col-span-2"><FI label="Condición de pago" value={form.condPago} onChange={e=>setForm({...form,condPago:e.target.value})}/></div>
        </div>
        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Ítems</label>
        <div className="space-y-2 mb-2">
          <div className="grid grid-cols-12 gap-1 text-xs text-slate-400 px-1"><span className="col-span-6">Descripción</span><span className="col-span-2 text-center">Cant.</span><span className="col-span-2 text-right">Precio</span><span className="col-span-1 text-right">Sub.</span><span className="col-span-1"/></div>
          {form.items.map(item=>(
            <div key={item.id} className="grid grid-cols-12 gap-1 items-center">
              <input className="col-span-6 border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-teal-400 focus:outline-none bg-white" value={item.desc} onChange={e=>updItem(item.id,'desc',e.target.value)} placeholder="Descripción"/>
              <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-1.5 text-sm text-center focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={item.cant} onChange={e=>updItem(item.id,'cant',e.target.value)}/>
              <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-1.5 text-sm text-right focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={item.precio} onChange={e=>updItem(item.id,'precio',e.target.value)}/>
              <span className="col-span-1 text-xs font-medium text-teal-700 text-right">{pesos(item.cant*item.precio)}</span>
              <button onClick={()=>remItem(item.id)} className="col-span-1 text-red-400 hover:text-red-600 text-lg text-center">×</button>
            </div>
          ))}
        </div>
        <button onClick={addItem} className="text-sm text-teal-600 hover:text-teal-800 font-medium">+ Agregar ítem</button>
        <div className="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center"><span className="font-semibold text-slate-700">TOTAL</span><span className="text-2xl font-bold text-teal-700">{pesos(form.items.reduce((s,i)=>s+i.cant*i.precio,0))}</span></div>
        <div className="flex gap-3 justify-between mt-4">
          {modal!=='add'&&<Btn variant="danger" onClick={()=>{del(modal.id);setModal(null);}}>Eliminar</Btn>}
          <div className="flex gap-3 ml-auto"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

/* ─── OBRAS ─── */
function Obras({obras,setObras}){
  const [modal,setModal]=useState(null);
  const empty={clienteNombre:'',producto:'',estado:'Pendiente de materiales',fechaInstalacion:'',instalador:'',presupuesto:'',observaciones:'',checklist:{medicion:false,material:false,instalacion:false,cobro:false}};
  const [form,setForm]=useState(empty);
  const [filtro,setFiltro]=useState('activas');
  const filtered=filtro==='activas'?obras.filter(o=>o.estado!=='Cobrada'):filtro==='cobradas'?obras.filter(o=>o.estado==='Cobrada'):obras;
  function save(){if(!form.clienteNombre.trim())return;if(modal==='add')setObras(p=>[...p,{...form,id:nid()}]);else setObras(p=>p.map(o=>o.id===modal.id?{...o,...form}:o));setModal(null);}
  function del(id){if(confirm('¿Eliminar obra?'))setObras(p=>p.filter(o=>o.id!==id));}
  function tck(id,campo){setObras(p=>p.map(o=>o.id===id?{...o,checklist:{...o.checklist,[campo]:!o.checklist[campo]}}:o));}
  const CL={medicion:'Medición',material:'Material',instalacion:'Instalación',cobro:'Cobro'};
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Obras</h2><p className="text-slate-500 text-sm">{obras.filter(o=>o.estado!=='Cobrada').length} activas</p></div>
        <Btn onClick={()=>{setForm(empty);setModal('add');}}>+ Nueva obra</Btn>
      </div>
      <div className="flex gap-2 mb-5">
        {[{k:'activas',l:'Activas'},{k:'cobradas',l:'Cobradas'},{k:'todas',l:'Todas'}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${filtro===f.k?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>{f.l}</button>
        ))}
      </div>
      <div className="space-y-4">{filtered.map(o=>{
        const done=Object.values(o.checklist).filter(Boolean).length;
        const pct=Math.round((done/4)*100);
        return <div key={o.id} className={`bg-white border rounded-xl p-4 card-hover ${o.estado==='Cobrada'?'border-green-100':'border-slate-100'}`}>
          <div className="flex items-start justify-between gap-3 mb-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1"><p className="font-semibold text-slate-800">{o.clienteNombre}</p><Badge text={o.estado} cls={C.obra[o.estado]}/></div>
              <p className="text-sm text-slate-600">{o.producto}</p>
              <div className="text-xs text-slate-400 mt-1 flex gap-4 flex-wrap">{o.fechaInstalacion&&<span>📅 {o.fechaInstalacion}</span>}{o.instalador&&<span>👷 {o.instalador}</span>}{o.presupuesto&&<span>📋 {o.presupuesto}</span>}</div>
              {o.observaciones&&<p className="text-xs text-slate-400 italic mt-1">"{o.observaciones}"</p>}
            </div>
            <div className="flex gap-3 flex-shrink-0">
              <button onClick={()=>{setForm({...o,checklist:{...o.checklist}});setModal(o);}} className="text-xs text-teal-600 hover:text-teal-800 font-medium">Editar</button>
              <button onClick={()=>del(o.id)} className="text-xs text-red-400 hover:text-red-600 font-medium">Borrar</button>
            </div>
          </div>
          <div className="flex gap-2 flex-wrap mb-3">
            {Object.entries(CL).map(([campo,label])=>(
              <button key={campo} onClick={()=>tck(o.id,campo)} className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border transition ${o.checklist[campo]?'bg-teal-50 border-teal-300 text-teal-700 font-medium':'bg-white border-slate-200 text-slate-500'}`}>
                <span className={`w-4 h-4 rounded-full flex items-center justify-center text-xs ${o.checklist[campo]?'bg-teal-500 text-white':'bg-slate-200'}`}>{o.checklist[campo]?'✓':''}</span>{label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-3">
            <div className="flex-1 bg-slate-100 rounded-full h-2"><div className={`h-2 rounded-full transition-all ${pct===100?'bg-green-500':'bg-teal-500'}`} style={{width:`${pct}%`}}/></div>
            <span className={`text-xs font-medium ${pct===100?'text-green-600':'text-slate-500'}`}>{pct}%</span>
          </div>
        </div>;
      })}
      {filtered.length===0&&<div className="text-center py-16 text-slate-400">No hay obras en este filtro.</div>}
      </div>
      {modal&&<Modal title={modal==='add'?'Nueva obra':'Editar obra'} onClose={()=>setModal(null)}>
        <div className="grid grid-cols-2 gap-x-4">
          <div className="col-span-2"><FI label="Cliente *" value={form.clienteNombre} onChange={e=>setForm({...form,clienteNombre:e.target.value})}/></div>
          <div className="col-span-2"><FI label="Producto / Descripción" value={form.producto} onChange={e=>setForm({...form,producto:e.target.value})}/></div>
          <FS label="Estado" opts={EST_OBRA} value={form.estado} onChange={e=>setForm({...form,estado:e.target.value})}/>
          <FI label="Instalador" value={form.instalador} onChange={e=>setForm({...form,instalador:e.target.value})}/>
          <FI label="Fecha instalación" type="date" value={form.fechaInstalacion} onChange={e=>setForm({...form,fechaInstalacion:e.target.value})}/>
          <FI label="N° Presupuesto" value={form.presupuesto} onChange={e=>setForm({...form,presupuesto:e.target.value})}/>
          <div className="col-span-2"><FT label="Observaciones técnicas" value={form.observaciones} onChange={e=>setForm({...form,observaciones:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-between">
          {modal!=='add'&&<Btn variant="danger" onClick={()=>{del(modal.id);setModal(null);}}>Eliminar</Btn>}
          <div className="flex gap-3 ml-auto"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

/* ─── TAREAS ─── */
function Tareas({tareas,setTareas}){
  const [modal,setModal]=useState(false);
  const empty={titulo:'',prioridad:'Media',tipo:'Seguimiento',estado:'Pendiente',vencimiento:'',notas:''};
  const [form,setForm]=useState(empty);
  const [filtro,setFiltro]=useState('Pendiente');
  const sorted=useMemo(()=>tareas.filter(t=>filtro==='todas'?true:t.estado===filtro).sort((a,b)=>{const p={Alta:0,Media:1,Baja:2};return (p[a.prioridad]||2)-(p[b.prioridad]||2)||(a.vencimiento||'').localeCompare(b.vencimiento||'');}),[tareas,filtro]);
  function save(){if(!form.titulo.trim())return;setTareas(p=>[...p,{...form,id:nid()}]);setModal(false);setForm(empty);}
  function toggle(id){setTareas(p=>p.map(t=>t.id===id?{...t,estado:t.estado==='Pendiente'?'Completada':'Pendiente'}:t));}
  function del(id){setTareas(p=>p.filter(t=>t.id!==id));}
  const pend=tareas.filter(t=>t.estado==='Pendiente').length;
  const altas=tareas.filter(t=>t.estado==='Pendiente'&&t.prioridad==='Alta').length;
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Tareas</h2><p className="text-slate-500 text-sm">{pend} pendientes {altas>0&&<span className="text-red-500 font-medium">· {altas} urgentes</span>}</p></div>
        <Btn onClick={()=>{setForm(empty);setModal(true);}}>+ Nueva tarea</Btn>
      </div>
      <div className="flex gap-2 mb-5 flex-wrap">
        {[{k:'Pendiente',l:`Pendientes (${pend})`},{k:'Completada',l:`Completadas (${tareas.filter(t=>t.estado==='Completada').length})`},{k:'todas',l:'Todas'}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${filtro===f.k?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>{f.l}</button>
        ))}
      </div>
      <div className="space-y-2">{sorted.map(t=>(
        <div key={t.id} className={`bg-white border rounded-xl p-3 flex items-center gap-3 card-hover ${t.estado==='Completada'?'opacity-50 border-slate-100':'border-slate-100'}`}>
          <button onClick={()=>toggle(t.id)} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition ${t.estado==='Completada'?'bg-teal-500 border-teal-500 text-white':'border-slate-300 hover:border-teal-400'}`}>{t.estado==='Completada'&&<span className="text-xs font-bold">✓</span>}</button>
          <div className="flex-1 min-w-0">
            <p className={`text-sm font-medium ${t.estado==='Completada'?'line-through text-slate-400':'text-slate-700'}`}>{t.titulo}</p>
            <div className="flex items-center gap-2 mt-1 flex-wrap"><Badge text={t.prioridad} cls={C.prio[t.prioridad]}/><Badge text={t.tipo} cls={C.ttarea[t.tipo]||'bg-slate-100 text-slate-500'}/>{t.vencimiento&&<span className="text-xs text-slate-400">📅 {t.vencimiento}</span>}</div>
          </div>
          <button onClick={()=>del(t.id)} className="text-slate-300 hover:text-red-400 text-xl transition flex-shrink-0">×</button>
        </div>
      ))}
      {sorted.length===0&&<div className="text-center py-16 text-slate-400">{filtro==='Completada'?'No hay tareas completadas.':'¡Todo al día! 🎉'}</div>}
      </div>
      {modal&&<Modal title="Nueva tarea" onClose={()=>setModal(false)}>
        <div className="grid grid-cols-2 gap-x-4">
          <div className="col-span-2"><FI label="Título *" value={form.titulo} onChange={e=>setForm({...form,titulo:e.target.value})} placeholder="Ej: Llamar cliente para confirmar medición"/></div>
          <FS label="Prioridad" opts={['Alta','Media','Baja']} value={form.prioridad} onChange={e=>setForm({...form,prioridad:e.target.value})}/>
          <FS label="Tipo" opts={TIPOS_TAREA} value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}/>
          <div className="col-span-2"><FI label="Fecha límite" type="date" value={form.vencimiento} onChange={e=>setForm({...form,vencimiento:e.target.value})}/></div>
          <div className="col-span-2"><FT label="Notas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-end"><Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Agregar</Btn></div>
      </Modal>}
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP PRINCIPAL — con gestión de concurrencia y soporte mobile
═══════════════════════════════════════════ */
const NAV=[{id:'dashboard',label:'Inicio',icon:'📊'},{id:'clientes',label:'Clientes',icon:'👥'},{id:'leads',label:'Leads',icon:'🔥'},{id:'presupuestos',label:'Ppto.',icon:'📋'},{id:'obras',label:'Obras',icon:'🏗️'},{id:'tareas',label:'Tareas',icon:'✅'}];

function App(){
  const isMobile=useIsMobile();
  const [scriptUrl,setScriptUrl]=useLs('gv_cloud_url_v2','');
  const [appState,setAppState]=useState(scriptUrl?'loading':'setup');
  const [loadMsg,setLoadMsg]=useState('Cargando desde Google Sheets...');
  const [sec,setSec]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(true);

  const [clientes,setClientes]=useState([]);
  const [leads,setLeads]=useState([]);
  const [presupuestos,setPresupuestos]=useState([]);
  const [obras,setObras]=useState([]);
  const [tareas,setTareas]=useState([]);

  const [syncStatus,setSyncStatus]=useState('idle');
  const [lastSync,setLastSync]=useState('');
  const [hasConflict,setHasConflict]=useState(false);
  const [pendingCount,setPendingCount]=useState(0);
  const [toast,setToast]=useState(null);

  const saveTimer=useRef(null);
  const refreshTimer=useRef(null);
  const lastSavedTs=useRef('');
  const dataReady=useRef(false);
  const isSaving=useRef(false);

  const tareasAltas=tareas.filter(t=>t.estado==='Pendiente'&&t.prioridad==='Alta').length;

  useEffect(()=>{if(scriptUrl&&appState==='loading') loadData(scriptUrl,true);},[]);

  async function loadData(url,initial=false){
    if(initial) setLoadMsg('Cargando desde Google Sheets...');
    try{
      const d=await sheetsLoad(url);
      const empty=!d.clientes.length&&!d.leads.length&&!d.tareas.length;
      if(empty&&initial){
        setLoadMsg('Primera vez — inicializando datos de ejemplo...');
        setClientes(INIT.clientes);setLeads(INIT.leads);setPresupuestos(INIT.presupuestos);setObras(INIT.obras);setTareas(INIT.tareas);
        const ts=await sheetsSave(url,INIT.clientes,INIT.leads,INIT.presupuestos,INIT.obras,INIT.tareas);
        lastSavedTs.current=ts;
      } else {
        setClientes(d.clientes);setLeads(d.leads);setPresupuestos(d.presupuestos);setObras(d.obras);setTareas(d.tareas);
        if(d.lastModified) lastSavedTs.current=d.lastModified;
      }
      setLastSync(hora());setSyncStatus('idle');setHasConflict(false);
      if(initial){setAppState('loaded');setTimeout(()=>{dataReady.current=true;startAutoRefresh(url);},600);}
    }catch(e){
      if(initial){showToast('❌ Error al cargar: '+e.message,'error');setAppState('setup');}
      else setSyncStatus('error');
    }
  }

  function startAutoRefresh(url){
    if(refreshTimer.current) clearInterval(refreshTimer.current);
    refreshTimer.current=setInterval(async()=>{
      if(isSaving.current) return;
      setSyncStatus(s=>s==='pending'?s:'checking');
      try{
        const d=await sheetsLoad(url);
        if(d.lastModified&&d.lastModified>lastSavedTs.current&&!isSaving.current){
          setHasConflict(true);setSyncStatus('idle');
        } else setSyncStatus(s=>s==='checking'?'idle':s);
      }catch{setSyncStatus(s=>s==='checking'?'idle':s);}
    },AUTO_REFRESH_MS);
  }

  useEffect(()=>()=>{
    if(refreshTimer.current) clearInterval(refreshTimer.current);
    if(saveTimer.current) clearTimeout(saveTimer.current);
  },[]);

  async function handleConnect(url){setScriptUrl(url);setAppState('loading');await loadData(url,true);}

  function disconnect(){
    if(confirm('¿Desconectar de Google Sheets?')){
      if(refreshTimer.current) clearInterval(refreshTimer.current);
      setScriptUrl('');localStorage.removeItem('gv_cloud_url_v2');
      setAppState('setup');dataReady.current=false;
    }
  }

  async function doSave(c,l,p,o,t){
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      isSaving.current=true;setSyncStatus('saving');
      try{
        const ts=await sheetsSave(scriptUrl,c,l,p,o,t);
        lastSavedTs.current=ts;setSyncStatus('idle');setLastSync(hora());setPendingCount(0);setHasConflict(false);
      }catch(e){setSyncStatus('error');showToast('❌ Error al guardar: '+e.message,'error');}
      finally{isSaving.current=false;}
    },2500);
  }

  async function manualSave(){
    if(saveTimer.current) clearTimeout(saveTimer.current);
    isSaving.current=true;setSyncStatus('saving');
    try{
      const ts=await sheetsSave(scriptUrl,clientes,leads,presupuestos,obras,tareas);
      lastSavedTs.current=ts;setSyncStatus('idle');setLastSync(hora());setPendingCount(0);setHasConflict(false);
      showToast('✓ Guardado en Google Sheets');
    }catch(e){setSyncStatus('error');showToast('❌ Error: '+e.message,'error');}
    finally{isSaving.current=false;}
  }

  function setC(v){const nv=typeof v==='function'?v(clientes):v;setClientes(nv);if(!dataReady.current)return;setSyncStatus('pending');setPendingCount(c=>c+1);doSave(nv,leads,presupuestos,obras,tareas);}
  function setL(v){const nv=typeof v==='function'?v(leads):v;setLeads(nv);if(!dataReady.current)return;setSyncStatus('pending');setPendingCount(c=>c+1);doSave(clientes,nv,presupuestos,obras,tareas);}
  function setP(v){const nv=typeof v==='function'?v(presupuestos):v;setPresupuestos(nv);if(!dataReady.current)return;setSyncStatus('pending');setPendingCount(c=>c+1);doSave(clientes,leads,nv,obras,tareas);}
  function setO(v){const nv=typeof v==='function'?v(obras):v;setObras(nv);if(!dataReady.current)return;setSyncStatus('pending');setPendingCount(c=>c+1);doSave(clientes,leads,presupuestos,nv,tareas);}
  function setT(v){const nv=typeof v==='function'?v(tareas):v;setTareas(nv);if(!dataReady.current)return;setSyncStatus('pending');setPendingCount(c=>c+1);doSave(clientes,leads,presupuestos,obras,nv);}

  function handleRefresh(){setHasConflict(false);loadData(scriptUrl,false);}
  function showToast(msg,type='success'){setToast({msg,type});setTimeout(()=>setToast(null),3500);}

  const syncColor={idle:'#0d9488',saving:'#f59e0b',checking:'#94a3b8',pending:'#f59e0b',error:'#ef4444'}[syncStatus]||'#0d9488';

  if(appState==='setup') return <SetupScreen onConnect={handleConnect}/>;
  if(appState==='loading') return <LoadingScreen msg={loadMsg}/>;

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',flexDirection:'column'}}>

      {/* ── CONFLICT BANNER ── */}
      {hasConflict&&<ConflictBanner onRefresh={handleRefresh}/>}

      {/* ── MOBILE HEADER (visible solo en mobile) ── */}
      <div className="mobile-header">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:syncColor,flexShrink:0}}/>
          <span style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:16}}>GRUPO VIEW</span>
          <span style={{color:'#475569',fontSize:11}}>CRM</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {syncStatus==='pending'&&<button onClick={manualSave} style={{background:'#0d9488',color:'white',border:'none',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Guardar</button>}
          {syncStatus==='error'&&<button onClick={manualSave} style={{background:'#ef4444',color:'white',border:'none',borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Reintentar</button>}
          <button onClick={disconnect} style={{color:'#475569',background:'none',border:'none',fontSize:18,cursor:'pointer',padding:'4px'}}>⚙️</button>
        </div>
      </div>

      {/* ── DESKTOP SYNC BAR (hidden on mobile via CSS) ── */}
      <div className="desktop-syncbar">
        <SyncBar status={syncStatus} lastSync={lastSync} pendingCount={pendingCount} onSave={manualSave} onDisconnect={disconnect}/>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>

        {/* ── DESKTOP SIDEBAR ── */}
        <aside className="desktop-sidebar" style={{width:sideOpen?220:64,flexShrink:0,background:'#0f172a',display:'flex',flexDirection:'column',transition:'width .25s ease'}}>
          <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
            {sideOpen?(
              <div>
                <div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,lineHeight:1.2}}>GRUPO VIEW</div>
                <div style={{color:'#64748b',fontSize:11,marginTop:2}}>CRM · Multi-usuario</div>
                <div style={{color:syncColor,fontSize:10,marginTop:3}}>
                  {syncStatus==='idle'&&lastSync&&`🟢 Sync ${lastSync}`}
                  {syncStatus==='saving'&&'⏳ Guardando...'}
                  {syncStatus==='checking'&&'🔄 Verificando...'}
                  {syncStatus==='pending'&&`🟡 ${pendingCount} cambio(s)`}
                  {syncStatus==='error'&&'🔴 Error de conexión'}
                </div>
              </div>
            ):(
              <div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,textAlign:'center'}}>GV</div>
            )}
          </div>
          <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
            {NAV.map(n=>{
              const active=sec===n.id;
              return <button key={n.id} onClick={()=>setSec(n.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:4,background:active?'#0d9488':'transparent',color:active?'white':'#94a3b8',fontSize:14,fontWeight:active?600:400,border:'none',cursor:'pointer',textAlign:'left'}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.background='rgba(255,255,255,.06)';e.currentTarget.style.color='white';}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#94a3b8';}}}>
                <span style={{fontSize:16,lineHeight:1}}>{n.icon}</span>
                {sideOpen&&<span style={{flex:1}}>{n.label}</span>}
                {sideOpen&&n.id==='tareas'&&tareasAltas>0&&<span style={{background:'#ef4444',color:'white',fontSize:10,borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{tareasAltas}</span>}
              </button>;
            })}
          </nav>
          <div style={{padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
            <button onClick={()=>setSideOpen(!sideOpen)} style={{width:'100%',color:'#475569',fontSize:13,background:'none',border:'none',cursor:'pointer',padding:'6px 12px',borderRadius:8,textAlign:'center'}}
              onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='#475569'}>
              {sideOpen?'◀ Colapsar':'▶'}
            </button>
          </div>
        </aside>

        {/* ── MAIN CONTENT ── */}
        <main style={{flex:1,overflowY:'auto',background:'#f1f5f9'}}>
          <div className="main-content" style={{maxWidth:1100,margin:'0 auto',padding:'28px'}}>
            {sec==='dashboard'&&<Dashboard clientes={clientes} leads={leads} presupuestos={presupuestos} obras={obras} tareas={tareas} setSeccion={setSec}/>}
            {sec==='clientes'&&<Clientes clientes={clientes} setClientes={setC}/>}
            {sec==='leads'&&<Leads leads={leads} setLeads={setL}/>}
            {sec==='presupuestos'&&<Presupuestos presupuestos={presupuestos} setPresupuestos={setP}/>}
            {sec==='obras'&&<Obras obras={obras} setObras={setO}/>}
            {sec==='tareas'&&<Tareas tareas={tareas} setTareas={setT}/>}
          </div>
        </main>
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <nav className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`bottom-nav-item ${sec===n.id?'active':''}`} onClick={()=>setSec(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span>{n.label}</span>
            {n.id==='tareas'&&tareasAltas>0&&<span className="bottom-nav-badge">{tareasAltas}</span>}
          </button>
        ))}
      </nav>

      {/* ── TOAST ── */}
      {toast&&<div className="slide-up" style={{position:'fixed',bottom:isMobile?80:24,right:16,left:isMobile?16:'auto',background:toast.type==='error'?'#ef4444':'#0d9488',color:'white',padding:'12px 18px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:9999,boxShadow:'0 8px 24px rgba(0,0,0,.2)',textAlign:isMobile?'center':'left'}}>{toast.msg}</div>}
    </div>
  );
}

      else{setSyncStatus('error');}
    }
  }

  /* ── auto-refresh para detectar cambios de otros usuarios ── */
  function startAutoRefresh(url){

    refreshTimer.current=setInterval(async()=>{
