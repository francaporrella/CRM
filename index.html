function useLs(k,def){
  const [v,sv]=useState(()=>{try{const x=localStorage.getItem(k);return x?JSON.parse(x):def;}catch{return def;}});
  useEffect(()=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},[k,v]);
  return[v,sv];
}
function useMobile(){

}

/* ══════════ SHEETS API ══════════ */
function parseData(d){
  const imap={};
  (d.Items_Presupuesto||[]).forEach(r=>{const k=str(r[0]);if(!imap[k])imap[k]=[];imap[k].push({id:nid(),desc:str(r[2]),cant:num(r[3]),precio:num(r[4])});});
  return{
    clientes:(d.Clientes||[]).map(r=>({id:num(r[0])||nid(),nombre:str(r[1]),tel:str(r[2]),email:str(r[3]),dir:str(r[4]),tipo:str(r[5])||'Particular',etiq:str(r[6])||'Nuevo',notas:str(r[7]),creado:str(r[8])})),
    leads:(d.Leads||[]).map(r=>({id:num(r[0])||nid(),nombre:str(r[1]),tel:str(r[2]),origen:str(r[3]),producto:str(r[4]),etapa:str(r[5])||'Nuevo contacto',valor:num(r[6]),seguimiento:str(r[7]),notas:str(r[8]),creado:str(r[9])})),
    presupuestos:(d.Presupuestos||[]).map(r=>({id:nid(),num:str(r[0]),cliente:str(r[1]),fecha:str(r[2]),vence:str(r[3]),estado:str(r[4])||'Borrador',items:imap[str(r[0])]||[{id:nid(),desc:'',cant:1,precio:0}],pago:str(r[7])})),
    obras:(d.Obras||[]).map(r=>({id:num(r[0])||nid(),cliente:str(r[1]),desc:str(r[2]),estado:str(r[3]),fecha:str(r[4]),inst:str(r[5]),ppto:str(r[6]),cl:{med:bool(r[7]),mat:bool(r[8]),ins:bool(r[9]),cob:bool(r[10])},obs:str(r[11])})),
    tareas:(d.Tareas||[]).map(r=>({id:num(r[0])||nid(),titulo:str(r[1]),prio:str(r[2])||'Media',tipo:str(r[3])||'Interno',estado:str(r[4])||'Pendiente',vence:str(r[5])})),
    ts:d._lastModified||'',
  };
}
async function apiLoad(url){
  const r=await fetch(url+'?t='+Date.now());
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Error');
  return parseData(j.data);
}
async function apiSetup(url){
  const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'setup'})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
}
async function apiSave(url,clientes,leads,pptos,obras,tareas){
  const items=pptos.flatMap(p=>(p.items||[]).map((it,i)=>[p.num,i+1,it.desc,it.cant,it.precio,it.cant*it.precio]));
  const ts=new Date().toISOString();
  const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'save',timestamp:ts,data:{
    Clientes:clientes.map(c=>[c.id,c.nombre,c.tel,c.email,c.dir,c.tipo,c.etiq,c.notas,c.creado]),
    Leads:leads.map(l=>[l.id,l.nombre,l.tel,l.origen,l.producto,l.etapa,l.valor,l.seguimiento,l.notas,l.creado]),
    Presupuestos:pptos.map(p=>[p.num,p.cliente,p.fecha,p.vence,p.estado,(p.items||[]).length,tot(p),p.pago]),
    Items_Presupuesto:items,
    Obras:obras.map(o=>[o.id,o.cliente,o.desc,o.estado,o.fecha,o.inst,o.ppto,o.cl.med?'Sí':'No',o.cl.mat?'Sí':'No',o.cl.ins?'Sí':'No',o.cl.cob?'Sí':'No',o.obs]),
    Tareas:tareas.map(t=>[t.id,t.titulo,t.prio,t.tipo,t.estado,t.vence]),
  }})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  if(!j.ok)throw new Error(j.error);
  return ts;
}

function Modal({title,onClose,sz,children}){
  const w=sz==="lg"?"max-w-3xl":"max-w-xl";
  return(
    <div className="fixed inset-0 bg-black bg-opacity-40 flex z-50 modal-wrap" style={{alignItems:'flex-end'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

/* ══════════ SETUP ══════════ */
function Setup({onOk}){
  const [url,su]=useState('');
  const [loading,sl]=useState(false);
  const [err,se]=useState('');
  async function go(){
    if(!url.includes('script.google.com')){se('Ingresá una URL válida de Apps Script.');return;}
    sl(true);se('');
    try{await apiSetup(url.trim());onOk(url.trim());}
    catch(e){se('No se pudo conectar: '+e.message);}
    finally{sl(false);}
  }
  return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-5">
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 fade-in">
        <div className="text-center mb-8">
          <div className="text-5xl mb-3">🟢</div>
          <h1 className="text-2xl font-black text-slate-900 syne">GRUPO VIEW CRM</h1>
          <p className="text-slate-500 text-sm mt-2">Conectá con Google Sheets para guardar datos en la nube</p>
        </div>
        <div className="bg-slate-50 rounded-2xl p-4 mb-5 text-xs text-slate-500">
          <p className="font-semibold text-slate-700 mb-2">📋 Cómo obtener la URL</p>
          <p>1. Seguí el archivo INSTRUCCIONES_GitHub_Pages.txt</p>
          <p className="mt-1">2. Publicá el Apps Script → copiá la URL → pegala acá</p>
        </div>
        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">URL del Apps Script</label>
        <input value={url} onChange={e=>su(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="https://script.google.com/macros/s/..." className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm mb-3 focus:border-teal-400 focus:outline-none"/>
        {err&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-3 text-xs text-red-700">{err}</div>}

/* ══════════ SYNCBAR ══════════ */
function SyncBar({st,lastSync,n,onSave,onDisc}){
  const m={
    idle:{dot:'bg-green-400',bg:'bg-green-50 border-green-200',tx:'text-green-800',msg:lastSync?`✓ Sincronizado · ${lastSync}`:'Conectado a Google Sheets'},
    checking:{dot:'bg-blue-400 pulse',bg:'bg-blue-50 border-blue-200',tx:'text-blue-800',msg:'Verificando cambios...'},
    saving:{dot:'bg-amber-400 pulse',bg:'bg-amber-50 border-amber-200',tx:'text-amber-800',msg:'Guardando en Google Sheets...'},
    pending:{dot:'bg-amber-400',bg:'bg-amber-50 border-amber-200',tx:'text-amber-800',msg:`${n} cambio(s) sin guardar`},
    error:{dot:'bg-red-400',bg:'bg-red-50 border-red-200',tx:'text-red-800',msg:'Error al guardar · Verificá tu conexión'},
  };
  const c=m[st]||m.idle;
  return(
    <div className={`flex items-center gap-3 px-4 py-2 border-b ${c.bg}`}>
      <div className={`sdot ${c.dot}`}/>
      <span className={`flex-1 text-sm font-medium ${c.tx}`}>{c.msg}</span>
      <span className="text-xs text-slate-400 hidden md:inline">📊 Google Sheets · sync 45s</span>
      {st==='pending'&&<button onClick={onSave} className="text-xs bg-teal-600 text-white px-3 py-1 rounded-lg">Guardar ya</button>}
      {st==='error'&&<button onClick={onSave} className="text-xs bg-red-500 text-white px-3 py-1 rounded-lg">Reintentar</button>}
      <button onClick={onDisc} className="text-slate-400 hover:text-slate-600 text-sm" title="Desconectar">⚙️</button>
    </div>
  );
}

/* ══════════ PRESUPUESTOS ══════════ */
function Pptos({data,set}){
  const [modal,sm]=useState(null);
  const [fil,sf]=useState('todos');
  const E=pp=>({num:numppto(pp),cliente:'',fecha:hoy(),vence:d14(),estado:'Borrador',items:[{id:nid(),desc:'',cant:1,precio:0}],pago:'Transferencia bancaria'});
  const [f,setF]=useState(()=>E(data));
  const fdata=data.filter(p=>fil==='todos'||p.estado===fil);
  function save(){if(!f.cliente.trim())return;if(modal==='add')set(p=>[...p,{...f,id:nid()}]);else set(p=>p.map(pp=>pp.id===modal.id?{...pp,...f}:pp));sm(null);}
  function del(id){if(confirm('¿Eliminar presupuesto?'))set(p=>p.filter(pp=>pp.id!==id));}
  function dup(p){set(prev=>[{...p,id:nid(),num:numppto([...prev,{}]),fecha:hoy(),vence:d14(),estado:'Borrador',items:p.items.map(i=>({...i,id:nid()}))}, ...prev]);}
  function addI(){setF(x=>({...x,items:[...x.items,{id:nid(),desc:'',cant:1,precio:0}]}));}
  function remI(id){setF(x=>({...x,items:x.items.filter(i=>i.id!==id)}));}
  function upI(id,k,v){setF(x=>({...x,items:x.items.map(i=>i.id===id?{...i,[k]:k==='desc'?v:num(v)}:i)}));}
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Presupuestos</h2><p className="text-slate-500 text-sm">{data.length} presupuestos</p></div>
        <Btn ch="+ Nuevo" onClick={()=>{setF(E(data));sm('add');}}/>

      <div className="flex gap-2 mb-4 flex-wrap">
        {['todos',...ESTADOS_PPTO].map(e=>{const c=e==='todos'?data.length:data.filter(p=>p.estado===e).length;return c>0?<button key={e} onClick={()=>sf(e)} className={`px-3 py-1.5 rounded-full text-xs font-medium border transition ${fil===e?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>{e==='todos'?'Todos':e} ({c})</button>:null;})}
      </div>
      <div className="space-y-3">{fdata.map(p=>(
        <div key={p.id} className="bg-white border border-slate-100 rounded-xl p-4 ch cursor-pointer" onClick={()=>{setF({...p,items:p.items.map(i=>({...i}))});sm(p);}}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap mb-1"><span className="text-xs font-mono text-slate-400">{p.num}</span><Bdg t={p.estado} c={CE.ppto[p.estado]}/></div>
              <p className="font-semibold text-slate-800">{p.cliente}</p>
              <p className="text-xs text-slate-400 mt-1">📅 {p.fecha} → {p.vence} · {p.pago}</p>
            </div>
            <div className="text-right flex-shrink-0">
              <p className="text-xl font-bold text-teal-700">{ars(tot(p))}</p>
              <div className="flex gap-2 mt-1 justify-end">
                <button onClick={e=>{e.stopPropagation();dup(p);}} className="text-xs text-slate-400">Dupl.</button>
                <button onClick={e=>{e.stopPropagation();del(p.id);}} className="text-xs text-red-400">Borrar</button>
              </div>
            </div>
          </div>
        </div>
      ))}
      {fdata.length===0&&<p className="text-center py-12 text-slate-400">No hay presupuestos.</p>}
      </div>
      {modal&&<Modal title={modal==='add'?'Nuevo presupuesto':`Presupuesto ${f.num}`} onClose={()=>sm(null)} sz="lg">
        <div className="grid grid-cols-2 gap-x-4">
          <Fi lbl="Número" value={f.num} onChange={e=>setF({...f,num:e.target.value})}/>
          <Fs lbl="Estado" opts={ESTADOS_PPTO} value={f.estado} onChange={e=>setF({...f,estado:e.target.value})}/>

          <Fi lbl="Vencimiento" type="date" value={f.vence} onChange={e=>setF({...f,vence:e.target.value})}/>
          <div className="col-span-2"><Fi lbl="Condición de pago" value={f.pago} onChange={e=>setF({...f,pago:e.target.value})}/></div>
        </div>
        <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Ítems</p>
        {f.items.map(it=>(
          <div key={it.id} className="grid grid-cols-12 gap-1 items-center mb-1.5">
            <input className="col-span-6 border border-slate-200 rounded-lg px-2 py-2 text-sm focus:border-teal-400 focus:outline-none bg-white" placeholder="Descripción" value={it.desc} onChange={e=>upI(it.id,'desc',e.target.value)}/>
            <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-2 text-sm text-center focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={it.cant} onChange={e=>upI(it.id,'cant',e.target.value)}/>
            <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-2 text-sm text-right focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={it.precio} onChange={e=>upI(it.id,'precio',e.target.value)}/>
            <span className="col-span-1 text-xs font-medium text-teal-700 text-right">{ars(it.cant*it.precio)}</span>
            <button onClick={()=>remI(it.id)} className="col-span-1 text-red-400 text-lg text-center">×</button>

        <div className="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center">

        </div>
      </Modal>}
    </div>
  );
}

/* ══════════ OBRAS ══════════ */

              {o.obs&&<p className="text-xs text-slate-400 italic mt-1">"{o.obs}"</p>}
            </div>
            <div className="flex gap-3 flex-shrink-0">
              <button onClick={()=>{sf({...o,cl:{...o.cl}});sm(o);}} className="text-xs text-teal-600 font-medium">Editar</button>
              <button onClick={()=>del(o.id)} className="text-xs text-red-400 font-medium">Borrar</button>
            </div>
          </div>
          <div className="flex gap-2 flex-wrap mb-3">
            {Object.entries(CL).map(([k,l])=>(
              <button key={k} onClick={()=>tck(o.id,k)} className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border transition ${o.cl[k]?'bg-teal-50 border-teal-300 text-teal-700 font-medium':'bg-white border-slate-200 text-slate-500'}`}>

      </div>
      {modal&&<Modal title={modal==='add'?'Nueva obra':'Editar obra'} onClose={()=>sm(null)}>
        <div className="grid grid-cols-2 gap-x-4">
          <div className="col-span-2"><Fi lbl="Cliente *" value={f.cliente} onChange={e=>sf({...f,cliente:e.target.value})}/></div>
          <div className="col-span-2"><Fi lbl="Descripción" value={f.desc} onChange={e=>sf({...f,desc:e.target.value})}/></div>

          <Fi lbl="N° Presupuesto" value={f.ppto} onChange={e=>sf({...f,ppto:e.target.value})}/>
          <div className="col-span-2"><Ft lbl="Observaciones" value={f.obs} onChange={e=>sf({...f,obs:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-between">
          {modal!=='add'&&<Btn ch="Eliminar" v="del" onClick={()=>{del(modal.id);sm(null);}}/>}

}

/* ══════════ TAREAS ══════════ */
function Tareas({data,set}){
  const [modal,sm]=useState(false);
  const E={titulo:'',prio:'Media',tipo:'Seguimiento',estado:'Pendiente',vence:''};
  const [f,sf]=useState(E);
  const [flt,sfl]=useState('Pendiente');
  const sorted=useMemo(()=>data.filter(t=>flt==='todas'?true:t.estado===flt).sort((a,b)=>{const p={Alta:0,Media:1,Baja:2};return(p[a.prio]||2)-(p[b.prio]||2)||(a.vence||'').localeCompare(b.vence||'');}),[data,flt]);
  function save(){if(!f.titulo.trim())return;set(p=>[...p,{...f,id:nid()}]);sm(false);sf(E);}
  function tog(id){set(p=>p.map(t=>t.id===id?{...t,estado:t.estado==='Pendiente'?'Completada':'Pendiente'}:t));}
  function del(id){set(p=>p.filter(t=>t.id!==id));}
  const pend=data.filter(t=>t.estado==='Pendiente').length;
  const altas=data.filter(t=>t.estado==='Pendiente'&&t.prio==='Alta').length;
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Tareas</h2><p className="text-slate-500 text-sm">{pend} pendientes {altas>0&&<span className="text-red-500 font-medium">· {altas} urgentes</span>}</p></div>
        <Btn ch="+ Nueva" onClick={()=>{sf(E);sm(true);}}/>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {[{k:'Pendiente',l:`Pendientes (${pend})`},{k:'Completada',l:`Completadas (${data.filter(t=>t.estado==='Completada').length})`},{k:'todas',l:'Todas'}].map(b=>(
          <button key={b.k} onClick={()=>sfl(b.k)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${flt===b.k?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600'}`}>{b.l}</button>
        ))}
      </div>
      <div className="space-y-2">{sorted.map(t=>(
        <div key={t.id} className={`bg-white border rounded-xl p-3 flex items-center gap-3 ch ${t.estado==='Completada'?'opacity-50':'border-slate-100'}`}>
          <button onClick={()=>tog(t.id)} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition ${t.estado==='Completada'?'bg-teal-500 border-teal-500 text-white':'border-slate-300'}`}>{t.estado==='Completada'&&<span className="text-xs font-bold">✓</span>}</button>
          <div className="flex-1 min-w-0">
            <p className={`text-sm font-medium ${t.estado==='Completada'?'line-through text-slate-400':'text-slate-700'}`}>{t.titulo}</p>
            <div className="flex items-center gap-2 mt-1 flex-wrap"><Bdg t={t.prio} c={CE.prio[t.prio]}/><Bdg t={t.tipo} c={CE.ttarea[t.tipo]}/>{t.vence&&<span className="text-xs text-slate-400">📅 {t.vence}</span>}</div>
          </div>
          <button onClick={()=>del(t.id)} className="text-slate-300 hover:text-red-400 text-xl flex-shrink-0">×</button>
        </div>
      ))}
      {sorted.length===0&&<p className="text-center py-12 text-slate-400">{flt==='Completada'?'No hay completadas.':'¡Todo al día! 🎉'}</p>}
      </div>
      {modal&&<Modal title="Nueva tarea" onClose={()=>sm(false)}>
        <div className="grid grid-cols-2 gap-x-4">
          <div className="col-span-2"><Fi lbl="Título *" value={f.titulo} onChange={e=>sf({...f,titulo:e.target.value})} placeholder="Ej: Llamar cliente para confirmar medición"/></div>
          <Fs lbl="Prioridad" opts={['Alta','Media','Baja']} value={f.prio} onChange={e=>sf({...f,prio:e.target.value})}/>
          <Fs lbl="Tipo" opts={TIPOS_TAREA} value={f.tipo} onChange={e=>sf({...f,tipo:e.target.value})}/>
          <div className="col-span-2"><Fi lbl="Fecha límite" type="date" value={f.vence} onChange={e=>sf({...f,vence:e.target.value})}/></div>
        </div>
        <div className="flex gap-3 justify-end"><Btn ch="Cancelar" v="sec" onClick={()=>sm(false)}/><Btn ch="Agregar" onClick={save}/></div>
      </Modal>}
    </div>
  );
}

/* ══════════ APP ══════════ */
const NAVS=[{id:'dashboard',lbl:'Inicio',ico:'📊'},{id:'clientes',lbl:'Clientes',ico:'👥'},{id:'leads',lbl:'Leads',ico:'🔥'},{id:'presupuestos',lbl:'Ppto.',ico:'📋'},{id:'obras',lbl:'Obras',ico:'🏗️'},{id:'tareas',lbl:'Tareas',ico:'✅'}];

function App(){
  const mob=useMobile();
  const [surl,setSurl]=useLs('gv_url','');
  const [phase,sp]=useState(surl?'load':'setup');
  const [lmsg,slm]=useState('');
  const [sec,ss]=useState('dashboard');
  const [open,so]=useState(true);
  const [C,sC]=useState([]);
  const [L,sL]=useState([]);
  const [P,sP]=useState([]);
  const [O,sO]=useState([]);
  const [T,sT]=useState([]);
  const [sync,ssync]=useState('idle');
  const [lsync,slsync]=useState('');
  const [conflict,sconf]=useState(false);
  const [pend,spnd]=useState(0);
  const [toast,stst]=useState(null);
  const tmr=useRef(null);
  const rtmr=useRef(null);
  const lastTs=useRef('');
  const ready=useRef(false);
  const saving=useRef(false);
  const taltas=T.filter(t=>t.estado==='Pendiente'&&t.prio==='Alta').length;

  useEffect(()=>{if(surl&&phase==='load')load(surl,true);},[]);
  useEffect(()=>()=>{if(rtmr.current)clearInterval(rtmr.current);if(tmr.current)clearTimeout(tmr.current);},[]);

  async function load(url,init=false){
    if(init)slm('Cargando desde Google Sheets...');
    try{
      const d=await apiLoad(url);
      const empty=!d.clientes.length&&!d.leads.length&&!d.tareas.length;
      if(empty&&init){
        slm('Primera vez — cargando datos de ejemplo...');
        sC(INIT.clientes);sL(INIT.leads);sP(INIT.presupuestos);sO(INIT.obras);sT(INIT.tareas);
        const ts=await apiSave(url,INIT.clientes,INIT.leads,INIT.presupuestos,INIT.obras,INIT.tareas);
        lastTs.current=ts;
      }else{
        sC(d.clientes);sL(d.leads);sP(d.presupuestos);sO(d.obras);sT(d.tareas);
        if(d.ts)lastTs.current=d.ts;
      }
      slsync(hora());ssync('idle');sconf(false);
      if(init){sp('ok');setTimeout(()=>{ready.current=true;autoRefresh(url);},600);}
    }catch(e){
      if(init){toast2('❌ Error: '+e.message,'err');sp('setup');}
      else ssync('error');
    }
  }

  function autoRefresh(url){
    if(rtmr.current)clearInterval(rtmr.current);
    rtmr.current=setInterval(async()=>{
      if(saving.current)return;
      ssync(s=>s==='pending'?s:'checking');
      try{
        const d=await apiLoad(url);
        if(d.ts&&d.ts>lastTs.current&&!saving.current){sconf(true);ssync('idle');}
        else ssync(s=>s==='checking'?'idle':s);
      }catch{ssync(s=>s==='checking'?'idle':s);}
    },AUTO_MS);
  }

  async function connect(url){setSurl(url);sp('load');await load(url,true);}

  function disc(){
    if(confirm('¿Desconectar?')){
      if(rtmr.current)clearInterval(rtmr.current);
      setSurl('');localStorage.removeItem('gv_url');
      sp('setup');ready.current=false;
    }
  }

  async function doSave(c,l,p,o,t){
    if(tmr.current)clearTimeout(tmr.current);
    tmr.current=setTimeout(async()=>{
      saving.current=true;ssync('saving');
      try{
        const ts=await apiSave(surl,c,l,p,o,t);
        lastTs.current=ts;ssync('idle');slsync(hora());spnd(0);sconf(false);
      }catch(e){ssync('error');toast2('❌ Error al guardar: '+e.message,'err');}
      finally{saving.current=false;}
    },2500);
  }

  async function manSave(){
    if(tmr.current)clearTimeout(tmr.current);
    saving.current=true;ssync('saving');
    try{
      const ts=await apiSave(surl,C,L,P,O,T);
      lastTs.current=ts;ssync('idle');slsync(hora());spnd(0);sconf(false);toast2('✓ Guardado en Google Sheets');
    }catch(e){ssync('error');toast2('❌ Error: '+e.message,'err');}
    finally{saving.current=false;}
  }

  function mk(sv,get){return v=>{const nv=typeof v==='function'?v(get()):v;sv(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(...buildArgs(sv,nv));};}
  function buildArgs(sv,nv){const all=[C,L,P,O,T];const idx=[sC,sL,sP,sO,sT].indexOf(sv);const r=[...all];r[idx]=nv;return r;}
  const setC=v=>{const nv=typeof v==='function'?v(C):v;sC(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(nv,L,P,O,T);};
  const setL=v=>{const nv=typeof v==='function'?v(L):v;sL(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(C,nv,P,O,T);};
  const setP=v=>{const nv=typeof v==='function'?v(P):v;sP(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(C,L,nv,O,T);};
  const setO=v=>{const nv=typeof v==='function'?v(O):v;sO(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(C,L,P,nv,T);};
  const setT=v=>{const nv=typeof v==='function'?v(T):v;sT(nv);if(!ready.current)return;ssync('pending');spnd(n=>n+1);doSave(C,L,P,O,nv);};

  function toast2(msg,type='ok'){stst({msg,type});setTimeout(()=>stst(null),3500);}
  const sc={idle:'#0d9488',saving:'#f59e0b',checking:'#64748b',pending:'#f59e0b',error:'#ef4444'}[sync]||'#0d9488';

  if(phase==='setup')return<Setup onOk={connect}/>;
  if(phase==='load')return<Loading msg={lmsg}/>;

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',flexDirection:'column'}}>
      {conflict&&<Conflict onOk={()=>{sconf(false);load(surl);}}/>}

      {/* Mobile header */}
      <div className="mhdr">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:sc}}/>
          <span style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:16}}>GRUPO VIEW</span>
          <span style={{color:'#475569',fontSize:11}}>CRM</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          {sync==='pending'&&<button onClick={manSave} style={{background:'#0d9488',color:'white',border:'none',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Guardar</button>}
          {sync==='error'&&<button onClick={manSave} style={{background:'#ef4444',color:'white',border:'none',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Reintentar</button>}
          <button onClick={disc} style={{color:'#475569',background:'none',border:'none',fontSize:18,cursor:'pointer'}}>⚙️</button>
        </div>
      </div>

      {/* Desktop sync bar */}
      <div className="dsk-sync">
        <SyncBar st={sync} lastSync={lsync} n={pend} onSave={manSave} onDisc={disc}/>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Desktop sidebar */}
        <aside className="dsk-sb" style={{width:open?220:64,flexShrink:0,background:'#0f172a',display:'flex',flexDirection:'column',transition:'width .25s'}}>
          <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
            {open?<div>
              <div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,lineHeight:1.2}}>GRUPO VIEW</div>
              <div style={{color:'#64748b',fontSize:11,marginTop:2}}>CRM · Multi-usuario</div>
              <div style={{color:sc,fontSize:10,marginTop:3}}>
                {sync==='idle'&&lsync&&`🟢 Sync ${lsync}`}
                {sync==='saving'&&'⏳ Guardando...'}
                {sync==='checking'&&'🔄 Verificando...'}
                {sync==='pending'&&`🟡 ${pend} cambio(s)`}
                {sync==='error'&&'🔴 Error'}
              </div>
            </div>:<div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,textAlign:'center'}}>GV</div>}
          </div>
          <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
            {NAVS.map(n=>{
              const act=sec===n.id;
              return<button key={n.id} onClick={()=>ss(n.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:4,background:act?'#0d9488':'transparent',color:act?'white':'#94a3b8',fontSize:14,fontWeight:act?600:400,border:'none',cursor:'pointer',textAlign:'left'}}
                onMouseEnter={e=>{if(!act){e.currentTarget.style.background='rgba(255,255,255,.06)';e.currentTarget.style.color='white';}}}
                onMouseLeave={e=>{if(!act){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#94a3b8';}}}>
                <span style={{fontSize:16,lineHeight:1}}>{n.ico}</span>
                {open&&<span style={{flex:1}}>{n.lbl}</span>}
                {open&&n.id==='tareas'&&taltas>0&&<span style={{background:'#ef4444',color:'white',fontSize:10,borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{taltas}</span>}
              </button>;
            })}
          </nav>
          <div style={{padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
            <button onClick={()=>so(!open)} style={{width:'100%',color:'#475569',fontSize:13,background:'none',border:'none',cursor:'pointer',padding:'6px 12px',borderRadius:8,textAlign:'center'}} onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='#475569'}>{open?'◀ Colapsar':'▶'}</button>
          </div>
        </aside>

        {/* Main */}
        <main style={{flex:1,overflowY:'auto',background:'#f1f5f9'}}>
          <div className="mcontent" style={{maxWidth:1100,margin:'0 auto'}}>
            {sec==='dashboard'&&<Dash C={C} L={L} P={P} O={O} T={T} go={ss}/>}
            {sec==='clientes'&&<Clientes data={C} set={setC}/>}
            {sec==='leads'&&<Leads data={L} set={setL}/>}
            {sec==='presupuestos'&&<Pptos data={P} set={setP}/>}
            {sec==='obras'&&<Obras data={O} set={setO}/>}
            {sec==='tareas'&&<Tareas data={T} set={setT}/>}
          </div>
        </main>
      </div>

      {/* Mobile bottom nav */}
      <nav className="bnav">
        {NAVS.map(n=>(
          <button key={n.id} className={`bni ${sec===n.id?'act':''}`} onClick={()=>ss(n.id)}>
            <span className="ico">{n.ico}</span>
            <span>{n.lbl}</span>
            {n.id==='tareas'&&taltas>0&&<span className="nbadge">{taltas}</span>}
          </button>
        ))}
      </nav>

      {/* Toast */}
      {toast&&<div className="slide-up" style={{position:'fixed',bottom:mob?80:24,right:16,left:mob?16:'auto',background:toast.type==='err'?'#ef4444':'#0d9488',color:'white',padding:'12px 18px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:9999,boxShadow:'0 8px 24px rgba(0,0,0,.2)',textAlign:mob?'center':'left'}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
