// ── Serializadores (objeto → fila) ──
const toRowCliente  = c=>[c.id,c.nombre,c.telefono,c.email,c.direccion,c.tipo,c.etiqueta,c.notas,c.creado];
const toRowLead     = l=>[l.id,l.clienteNombre,l.telefono,l.origen,l.producto,l.etapa,l.valor,l.fechaSeguimiento,l.notas,l.creado];
const toRowPpto     = p=>[p.numero,p.clienteNombre,p.fecha,p.vencimiento,p.estado,(p.items||[]).length,totalP(p),p.condPago];
const toRowItem     = (num,it,i)=>[num,i+1,it.desc,it.cant,it.precio,it.cant*it.precio];
const toRowObra     = o=>[o.id,o.clienteNombre,o.producto,o.estado,o.fechaInstalacion,o.instalador,o.presupuesto,o.checklist.medicion?'Sí':'No',o.checklist.material?'Sí':'No',o.checklist.instalacion?'Sí':'No',o.checklist.cobro?'Sí':'No',o.observaciones];
const toRowTarea    = t=>[t.id,t.titulo,t.prioridad,t.tipo,t.estado,t.vencimiento,t.notas];

// ── Deserializadores (fila → objeto) ──
const si=v=>str(v).toLowerCase()==='sí'||str(v).toLowerCase()==='si';

function fromRowCliente(r){return{id:num(r[0])||nid(),nombre:str(r[1]),telefono:str(r[2]),email:str(r[3]),direccion:str(r[4]),tipo:str(r[5])||'Particular',etiqueta:str(r[6])||'Nuevo',notas:str(r[7]),creado:str(r[8])};}
function fromRowLead(r){return{id:num(r[0])||nid(),clienteNombre:str(r[1]),telefono:str(r[2]),origen:str(r[3]),producto:str(r[4]),etapa:str(r[5])||'Nuevo contacto',valor:num(r[6]),fechaSeguimiento:str(r[7]),notas:str(r[8]),creado:str(r[9])};}
function fromRowObra(r){return{id:num(r[0])||nid(),clienteNombre:str(r[1]),producto:str(r[2]),estado:str(r[3]),fechaInstalacion:str(r[4]),instalador:str(r[5]),presupuesto:str(r[6]),checklist:{medicion:si(r[7]),material:si(r[8]),instalacion:si(r[9]),cobro:si(r[10])},observaciones:str(r[11])};}
function fromRowTarea(r){return{id:num(r[0])||nid(),titulo:str(r[1]),prioridad:str(r[2])||'Media',tipo:str(r[3])||'Interno',estado:str(r[4])||'Pendiente',vencimiento:str(r[5]),notas:str(r[6])};}

function fromRowsPptos(pRows,iRows){
  const map={};
  (iRows||[]).forEach(r=>{const n=str(r[0]);if(!map[n])map[n]=[];map[n].push({id:nid(),desc:str(r[2]),cant:num(r[3]),precio:num(r[4])});});
  return (pRows||[]).map(r=>({id:nid(),numero:str(r[0]),clienteNombre:str(r[1]),fecha:str(r[2]),vencimiento:str(r[3]),estado:str(r[4])||'Borrador',items:map[str(r[0])]||[{id:nid(),desc:'',cant:1,precio:0}],condPago:str(r[7])}));
}

// ── API calls ──
async function sheetsLoad(url){
  const resp=await fetch(url+'?t='+Date.now());
  if(!resp.ok)throw new Error('Error HTTP '+resp.status);
  const j=await resp.json();
  if(!j.ok)throw new Error(j.error||'Error desconocido');
  const d=j.data;
  return {
    clientes: (d.Clientes||[]).map(fromRowCliente),
    leads:    (d.Leads||[]).map(fromRowLead),
    presupuestos: fromRowsPptos(d.Presupuestos,d.Items_Presupuesto),
    obras:    (d.Obras||[]).map(fromRowObra),
    tareas:   (d.Tareas||[]).map(fromRowTarea),
  };
}

async function sheetsSetup(url){
  const resp=await fetch(url,{method:'POST',body:JSON.stringify({action:'setup'})});
  if(!resp.ok)throw new Error('Error HTTP '+resp.status);
  const j=await resp.json();
  if(!j.ok)throw new Error(j.error||'Error al configurar');
  return j;
}

async function sheetsSave(url,clientes,leads,presupuestos,obras,tareas){
  const items=presupuestos.flatMap(p=>(p.items||[]).map((it,i)=>toRowItem(p.numero,it,i)));
  const data={
    Clientes:clientes.map(toRowCliente),
    Leads:leads.map(toRowLead),
    Presupuestos:presupuestos.map(toRowPpto),
    Items_Presupuesto:items,
    Obras:obras.map(toRowObra),
    Tareas:tareas.map(toRowTarea),
  };
  const resp=await fetch(url,{method:'POST',body:JSON.stringify({action:'save',data})});
  if(!resp.ok)throw new Error('Error HTTP '+resp.status);
  const j=await resp.json();
  if(!j.ok)throw new Error(j.error||'Error al guardar');
  return j;
}

function SetupScreen({onConnect}){
  const [url,setUrl]=useState('');

  const [error,setError]=useState('');

  async function connect(){
    if(!url.trim()||!url.includes('script.google.com')){setError('Ingresá una URL válida de Google Apps Script.');return;}
    setLoading(true);setError('');
    try{
      await sheetsSetup(url.trim());
      onConnect(url.trim());
    }catch(e){setError('No se pudo conectar: '+e.message+'. Verificá la URL y que el script esté publicado correctamente.');}
    finally{setLoading(false);}
  }

  return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 fade-in">

          <p className="text-slate-500 text-sm mt-2">Conectá con Google Sheets para guardar tus datos en la nube</p>
        </div>

        <div className="bg-slate-50 rounded-2xl p-5 mb-6">
          <h3 className="font-semibold text-slate-700 text-sm mb-3">📋 ¿Cómo obtener la URL?</h3>
          <ol className="text-xs text-slate-500 space-y-2">
            <li className="flex gap-2"><span className="bg-teal-500 text-white rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-bold text-xs">1</span>Abrí el archivo de instrucciones incluido</li>
            <li className="flex gap-2"><span className="bg-teal-500 text-white rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-bold text-xs">2</span>Seguí los 4 pasos para crear el Apps Script</li>
            <li className="flex gap-2"><span className="bg-teal-500 text-white rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 font-bold text-xs">3</span>Copiá la URL de la aplicación web y pegala acá</li>
          </ol>
        </div>

        <div className="mb-4">
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">URL del Apps Script</label>
          <input
            value={url}
            onChange={e=>setUrl(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&connect()}
            placeholder="https://script.google.com/macros/s/..."
            className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 bg-white focus:border-teal-400 focus:outline-none"
          />
        </div>

        {error&&<div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-4 text-xs text-red-700">{error}</div>}

        <button
          onClick={connect}
          disabled={loading}
          className="w-full bg-teal-600 hover:bg-teal-700 disabled:opacity-60 text-white font-semibold py-3 rounded-xl transition text-sm"
        >
          {loading?(
            <span className="flex items-center justify-center gap-2">
              <svg className="spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              Conectando con Google Sheets...
            </span>
          ):'Conectar con Google Sheets →'}
        </button>

        <p className="text-center text-xs text-slate-400 mt-4">
          Esta configuración se guarda en tu navegador.<br/>No necesitás repetirla cada vez.
        </p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   CLOUD SYNC BAR
═══════════════════════════════ */
function CloudSyncBar({syncStatus,lastSync,onManualSave,onDisconnect}){
  const configs={
    idle:    {dot:"bg-green-400", bg:"bg-green-50 border-green-200", text:"text-green-800", msg:lastSync?`✓ Sincronizado · ${lastSync}`:"Conectado a Google Sheets"},
    saving:  {dot:"bg-amber-400 pulse", bg:"bg-amber-50 border-amber-200", text:"text-amber-800", msg:"Guardando en Google Sheets..."},
    pending: {dot:"bg-amber-400", bg:"bg-amber-50 border-amber-200", text:"text-amber-800", msg:"Cambios pendientes de guardar"},
    error:   {dot:"bg-red-400", bg:"bg-red-50 border-red-200", text:"text-red-800", msg:"Error al guardar · Verificá tu conexión"},
  };
  const cfg=configs[syncStatus]||configs.idle;
  return(
    <div className={`flex items-center gap-3 px-4 py-2.5 border-b ${cfg.bg}`}>
      <div className={`sync-dot ${cfg.dot}`}/>
      <span className={`text-sm flex-1 font-medium ${cfg.text}`}>{cfg.msg}</span>
      <span className="text-xs text-slate-400 hidden sm:inline">📊 Google Sheets</span>
      {syncStatus==='pending'&&<button onClick={onManualSave} className="text-xs bg-teal-600 text-white px-3 py-1.5 rounded-lg hover:bg-teal-700 transition">Guardar ahora</button>}
      {syncStatus==='error'&&<button onClick={onManualSave} className="text-xs bg-red-500 text-white px-3 py-1.5 rounded-lg hover:bg-red-600 transition">Reintentar</button>}
      <button onClick={onDisconnect} className="text-xs text-slate-400 hover:text-slate-600 transition" title="Desconectar">⚙️</button>
    </div>
  );
}

/* ═══════════════════════════════
   DASHBOARD
═══════════════════════════════ */
function Dashboard({clientes,leads,presupuestos,obras,tareas,setSeccion}){
  const activos=leads.filter(l=>!["Ganado","Perdido"].includes(l.etapa));
  const pipeline=activos.reduce((s,l)=>s+(l.valor||0),0);
  const cerradas=leads.filter(l=>l.etapa==="Ganado").length;
  const tasa=leads.length>0?Math.round((cerradas/leads.length)*100):0;
  const pptosPend=presupuestos.filter(p=>["Enviado","Borrador"].includes(p.estado));
  const obrasCurso=obras.filter(o=>o.estado!=="Cobrada");
  const tareasAltas=tareas.filter(t=>t.estado==="Pendiente"&&t.prioridad==="Alta");
  return(
    <div className="fade-in">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-slate-900 syne">Dashboard</h2>
        <p className="text-slate-500 text-sm mt-0.5">{new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        {[{icon:"👥",label:"Clientes",val:clientes.length,color:"bg-blue-50 border-blue-100",sec:"clientes"},
          {icon:"🔥",label:"Leads activos",val:activos.length,color:"bg-orange-50 border-orange-100",sec:"leads"},
          {icon:"📋",label:"Presupuestos pend.",val:pptosPend.length,color:"bg-amber-50 border-amber-100",sec:"presupuestos"},
          {icon:"🏗️",label:"Obras en curso",val:obrasCurso.length,color:"bg-teal-50 border-teal-100",sec:"obras"},
        ].map(k=>(
          <button key={k.label} onClick={()=>setSeccion(k.sec)} className={`${k.color} border rounded-xl p-4 text-left hover:shadow-md transition card-hover w-full`}>
            <div className="text-xl mb-2">{k.icon}</div>
            <div className="text-3xl font-bold text-slate-800">{k.val}</div>
            <div className="text-xs text-slate-500 mt-1">{k.label}</div>
          </button>
        ))}
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-5">
        <div className="col-span-2 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-5 text-white">
          <div className="flex items-start justify-between mb-4">
            <div>
              <div className="text-slate-400 text-sm mb-1">Valor total del pipeline</div>
              <div className="text-3xl font-bold">{pesos(pipeline)}</div>
              <div className="text-slate-400 text-sm mt-1">Tasa de cierre: {tasa}%</div>
            </div>
            <div className="bg-teal-500 bg-opacity-20 rounded-xl px-3 py-1 text-teal-400 text-sm">{activos.length} activos</div>
          </div>
          {ETAPAS.filter(e=>!["Ganado","Perdido"].includes(e)).map(e=>{
            const cnt=leads.filter(l=>l.etapa===e).length;
            const pct=leads.length>0?(cnt/leads.length)*100:0;
            return(
              <div key={e} className="flex items-center gap-3 text-sm mb-2">
                <span className="text-slate-400 text-xs w-36">{e}</span>
                <div className="flex-1 bg-slate-700 rounded-full h-1.5"><div className="bg-teal-400 h-1.5 rounded-full transition-all" style={{width:`${pct}%`}}></div></div>
                <span className="text-slate-400 text-xs w-4 text-right">{cnt}</span>
              </div>
            );
          })}
        </div>
        <div className="bg-white border border-slate-100 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-slate-700 text-sm">⚠️ Tareas urgentes</h3>
            <button onClick={()=>setSeccion("tareas")} className="text-xs text-teal-600 hover:underline">Ver todas</button>
          </div>
          {tareasAltas.length===0&&<p className="text-slate-400 text-sm">Sin tareas urgentes 🎉</p>}
          {tareasAltas.slice(0,5).map(t=>(
            <div key={t.id} className="flex items-start gap-2 p-2 rounded-lg hover:bg-slate-50 mb-1">
              <span className="text-red-500 text-sm mt-0.5">●</span>
              <div><p className="text-sm text-slate-700 leading-tight">{t.titulo}</p><p className="text-xs text-slate-400 mt-0.5">📅 {t.vencimiento}</p></div>
            </div>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div className="bg-white border border-slate-100 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-slate-700 text-sm">🏗️ Obras activas</h3>
            <button onClick={()=>setSeccion("obras")} className="text-xs text-teal-600 hover:underline">Ver todas</button>
          </div>
          {obrasCurso.slice(0,4).map(o=>{
            const done=Object.values(o.checklist).filter(Boolean).length;
            return(
              <div key={o.id} className="p-3 rounded-lg border border-slate-100 mb-2">
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div><p className="text-sm font-medium text-slate-700">{o.clienteNombre}</p><p className="text-xs text-slate-400">{o.producto.slice(0,40)}...</p></div>
                  <Badge text={o.estado} cls={C.obra[o.estado]}/>
                </div>
                <div className="bg-slate-100 rounded-full h-1.5"><div className="bg-teal-500 h-1.5 rounded-full" style={{width:`${(done/4)*100}%`}}></div></div>
                <div className="text-xs text-slate-400 mt-1">{done}/4 pasos · {o.fechaInstalacion}</div>
              </div>
            );
          })}
          {obrasCurso.length===0&&<p className="text-slate-400 text-sm">Sin obras activas</p>}
        </div>
        <div className="bg-white border border-slate-100 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-slate-700 text-sm">💰 Leads en negociación</h3>
            <button onClick={()=>setSeccion("leads")} className="text-xs text-teal-600 hover:underline">Ver todos</button>
          </div>
          {leads.filter(l=>["Negociación","Presupuesto enviado"].includes(l.etapa)).slice(0,4).map(l=>(
            <div key={l.id} className="flex items-center gap-3 p-3 rounded-lg border border-slate-100 mb-2">
              <div className="flex-1 min-w-0"><p className="text-sm font-medium text-slate-700">{l.clienteNombre}</p><p className="text-xs text-slate-400">{l.producto}</p></div>
              <div className="text-right flex-shrink-0"><p className="text-sm font-bold text-teal-700">{pesos(l.valor)}</p><Badge text={l.etapa} cls={C.etapa[l.etapa]}/></div>
            </div>
          ))}
          {leads.filter(l=>["Negociación","Presupuesto enviado"].includes(l.etapa)).length===0&&<p className="text-slate-400 text-sm">Sin leads en negociación</p>}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   CLIENTES
═══════════════════════════════ */
function Clientes({clientes,setClientes}){
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const empty={nombre:'',telefono:'',email:'',direccion:'',tipo:'Particular',etiqueta:'Nuevo',notas:''};
  const [form,setForm]=useState(empty);
  const filtered=useMemo(()=>clientes.filter(c=>{const q=search.toLowerCase();return c.nombre.toLowerCase().includes(q)||c.telefono.includes(q)||c.email.toLowerCase().includes(q);}),[clientes,search]);
  function save(){if(!form.nombre.trim())return;if(modal==='add')setClientes(p=>[...p,{...form,id:nid(),creado:hoy()}]);else setClientes(p=>p.map(c=>c.id===modal.id?{...c,...form}:c));setModal(null);}
  function del(id){if(confirm('¿Eliminar cliente?'))setClientes(p=>p.filter(c=>c.id!==id));}
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Clientes</h2><p className="text-slate-500 text-sm">{clientes.length} registrados</p></div>
        <Btn onClick={()=>{setForm(empty);setModal('add');}}>+ Nuevo cliente</Btn>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nombre, teléfono, email..." className="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm bg-white focus:border-teal-400 focus:outline-none mb-4"/>
      <div className="space-y-3">
        {filtered.map(c=>(
          <div key={c.id} className="bg-white border border-slate-100 rounded-xl p-4 card-hover">
            <div className="flex items-start justify-between gap-3">
              <div className="flex items-start gap-3 flex-1 min-w-0">
                <div className="text-2xl">{TICON[c.tipo]||'👤'}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1"><p className="font-semibold text-slate-800">{c.nombre}</p><Badge text={c.etiqueta} cls={C.etiq[c.etiqueta]}/><Badge text={c.tipo} cls={C.tcli[c.tipo]}/></div>
                  <div className="text-sm text-slate-500 flex flex-wrap gap-x-4 gap-y-0.5">{c.telefono&&<span>📱 {c.telefono}</span>}{c.email&&<span>✉️ {c.email}</span>}{c.direccion&&<span>📍 {c.direccion}</span>}</div>
                  {c.notas&&<p className="text-xs text-slate-400 mt-1 italic">"{c.notas}"</p>}
                </div>
              </div>
              <div className="flex gap-3 flex-shrink-0">
                <button onClick={()=>{setForm({...c});setModal(c);}} className="text-xs text-teal-600 hover:text-teal-800 font-medium">Editar</button>
                <button onClick={()=>del(c.id)} className="text-xs text-red-400 hover:text-red-600 font-medium">Borrar</button>
              </div>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="text-center py-16 text-slate-400">No se encontraron clientes.</div>}
      </div>
      {modal&&(
        <Modal title={modal==='add'?'Nuevo cliente':'Editar cliente'} onClose={()=>setModal(null)}>
          <div className="grid grid-cols-2 gap-x-4">
            <div className="col-span-2"><FI label="Nombre / Razón social *" value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})}/></div>
            <FI label="Teléfono (WhatsApp)" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})}/>
            <FI label="Email" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
            <div className="col-span-2"><FI label="Dirección" value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})}/></div>
            <FS label="Tipo" opts={TIPOS_CLI} value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}/>
            <FS label="Etiqueta" opts={ETIQ_CLI} value={form.etiqueta} onChange={e=>setForm({...form,etiqueta:e.target.value})}/>
            <div className="col-span-2"><FT label="Notas internas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
          </div>
          <div className="flex gap-3 justify-end"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════════════════════
   LEADS
═══════════════════════════════ */
function Leads({leads,setLeads}){
  const [modal,setModal]=useState(null);
  const [vista,setVista]=useState('kanban');
  const empty={clienteNombre:'',telefono:'',origen:'WhatsApp',producto:PRODUCTOS[0],etapa:'Nuevo contacto',fechaSeguimiento:'',notas:'',valor:''};
  const [form,setForm]=useState(empty);
  function save(){if(!form.clienteNombre.trim())return;const d={...form,valor:num(form.valor)};if(modal==='add')setLeads(p=>[...p,{...d,id:nid(),creado:hoy()}]);else setLeads(p=>p.map(l=>l.id===modal.id?{...l,...d}:l));setModal(null);}
  function del(id){if(confirm('¿Eliminar lead?'))setLeads(p=>p.filter(l=>l.id!==id));}
  function avanzar(id){setLeads(p=>p.map(l=>{if(l.id!==id)return l;const i=ETAPAS.indexOf(l.etapa);return i<ETAPAS.length-1?{...l,etapa:ETAPAS[i+1]}:l;}));}
  function retroceder(id){setLeads(p=>p.map(l=>{if(l.id!==id)return l;const i=ETAPAS.indexOf(l.etapa);return i>0?{...l,etapa:ETAPAS[i-1]}:l;}));}
  const activos=leads.filter(l=>!["Ganado","Perdido"].includes(l.etapa));
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Leads</h2><p className="text-slate-500 text-sm">{activos.length} activos · {pesos(activos.reduce((s,l)=>s+(l.valor||0),0))} pipeline</p></div>
        <div className="flex gap-2">
          <div className="flex bg-white border border-slate-200 rounded-lg overflow-hidden">
            <button onClick={()=>setVista('kanban')} className={`px-3 py-1.5 text-sm transition ${vista==='kanban'?'bg-teal-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>Kanban</button>
            <button onClick={()=>setVista('lista')} className={`px-3 py-1.5 text-sm transition ${vista==='lista'?'bg-teal-600 text-white':'text-slate-600 hover:bg-slate-50'}`}>Lista</button>
          </div>
          <Btn onClick={()=>{setForm(empty);setModal('add');}}>+ Nuevo lead</Btn>
        </div>
      </div>
      {vista==='kanban'?(
        <div className="kanban-scroll">
          <div className="kanban-board">
            {ETAPAS.map(etapa=>{
              const col=leads.filter(l=>l.etapa===etapa);
              const colV=col.reduce((s,l)=>s+(l.valor||0),0);
              return(
                <div key={etapa} className="kanban-col">
                  <div className="mb-3 px-1">
                    <div className="flex items-center justify-between"><span className="text-xs font-bold uppercase tracking-wider text-slate-600">{etapa}</span><span className="text-xs bg-slate-200 text-slate-600 rounded-full px-2 py-0.5">{col.length}</span></div>
                    {colV>0&&<div className="text-xs text-slate-400 mt-0.5">{pesos(colV)}</div>}
                  </div>
                  <div className="space-y-3">
                    {col.map(l=>(
                      <div key={l.id} className="bg-white border border-slate-100 rounded-xl p-3 cursor-pointer card-hover" onClick={()=>{setForm({...l,valor:String(l.valor||'')});setModal(l);}}>
                        <p className="font-semibold text-slate-800 text-sm">{l.clienteNombre}</p>
                        <p className="text-xs text-slate-500 mt-0.5">{l.producto}</p>
                        {l.valor>0&&<p className="text-sm font-bold text-teal-700 mt-1">{pesos(l.valor)}</p>}
                        <Badge text={l.origen} cls="bg-slate-100 text-slate-500 mt-1.5"/>
                        {l.fechaSeguimiento&&<p className="text-xs text-slate-400 mt-1.5">📅 {l.fechaSeguimiento}</p>}
                        {!["Ganado","Perdido"].includes(etapa)&&(
                          <div className="flex gap-2 mt-2 pt-2 border-t border-slate-50">
                            {ETAPAS.indexOf(etapa)>0&&<button onClick={e=>{e.stopPropagation();retroceder(l.id);}} className="text-xs text-slate-400 hover:text-slate-700">◀ Atrás</button>}
                            <button onClick={e=>{e.stopPropagation();avanzar(l.id);}} className="text-xs text-teal-600 hover:text-teal-800 font-semibold ml-auto">Avanzar ▶</button>
                          </div>
                        )}
                      </div>
                    ))}
                    {col.length===0&&<div className="border-2 border-dashed border-slate-100 rounded-xl h-16 flex items-center justify-center"><span className="text-slate-300 text-xs">Vacío</span></div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ):(
        <div className="space-y-3">
          {leads.map(l=>(
            <div key={l.id} className="bg-white border border-slate-100 rounded-xl p-4 card-hover cursor-pointer" onClick={()=>{setForm({...l,valor:String(l.valor||'')});setModal(l);}}>
              <div className="flex items-start justify-between gap-3">
                <div><div className="flex items-center gap-2 flex-wrap mb-1"><p className="font-semibold text-slate-800">{l.clienteNombre}</p><Badge text={l.etapa} cls={C.etapa[l.etapa]}/><Badge text={l.origen} cls="bg-slate-100 text-slate-500"/></div><p className="text-sm text-slate-500">{l.producto}</p>{l.fechaSeguimiento&&<p className="text-xs text-slate-400 mt-1">📅 {l.fechaSeguimiento}</p>}</div>
                {l.valor>0&&<p className="text-lg font-bold text-teal-700 flex-shrink-0">{pesos(l.valor)}</p>}
              </div>
            </div>
          ))}
        </div>
      )}
      {modal&&(
        <Modal title={modal==='add'?'Nuevo lead':'Editar lead'} onClose={()=>setModal(null)}>
          <div className="grid grid-cols-2 gap-x-4">
            <FI label="Nombre del contacto *" value={form.clienteNombre} onChange={e=>setForm({...form,clienteNombre:e.target.value})}/>
            <FI label="Teléfono" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})}/>
            <FS label="Origen" opts={ORIGENES} value={form.origen} onChange={e=>setForm({...form,origen:e.target.value})}/>
            <FS label="Producto" opts={PRODUCTOS} value={form.producto} onChange={e=>setForm({...form,producto:e.target.value})}/>
            <FS label="Etapa" opts={ETAPAS} value={form.etapa} onChange={e=>setForm({...form,etapa:e.target.value})}/>
            <FI label="Valor estimado ($)" type="number" value={form.valor} onChange={e=>setForm({...form,valor:e.target.value})}/>
            <div className="col-span-2"><FI label="Fecha de seguimiento" type="date" value={form.fechaSeguimiento} onChange={e=>setForm({...form,fechaSeguimiento:e.target.value})}/></div>
            <div className="col-span-2"><FT label="Notas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
          </div>
          <div className="flex gap-3 justify-between">
            {modal!=='add'&&<Btn variant="danger" onClick={()=>{del(modal.id);setModal(null);}}>Eliminar</Btn>}
            <div className="flex gap-3 ml-auto"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════════════════════
   PRESUPUESTOS
═══════════════════════════════ */
function Presupuestos({presupuestos,setPresupuestos}){
  const [modal,setModal]=useState(null);
  const [filtro,setFiltro]=useState('todos');
  function ef(pp){return{numero:nnum(pp),clienteNombre:'',fecha:hoy(),vencimiento:enDias(14),estado:'Borrador',items:[{id:nid(),desc:'',cant:1,precio:0}],condPago:'Transferencia bancaria'};}
  const [form,setForm]=useState(()=>ef(presupuestos));
  const filtered=presupuestos.filter(p=>filtro==='todos'||p.estado===filtro);
  function save(){if(!form.clienteNombre.trim())return;if(modal==='add')setPresupuestos(p=>[...p,{...form,id:nid()}]);else setPresupuestos(p=>p.map(pp=>pp.id===modal.id?{...pp,...form}:pp));setModal(null);}
  function del(id){if(confirm('¿Eliminar presupuesto?'))setPresupuestos(p=>p.filter(pp=>pp.id!==id));}
  function dup(p){setPresupuestos(prev=>[{...p,id:nid(),numero:nnum([...prev,{}]),fecha:hoy(),vencimiento:enDias(14),estado:'Borrador',items:p.items.map(i=>({...i,id:nid()}))}, ...prev]);}
  function addItem(){setForm(f=>({...f,items:[...f.items,{id:nid(),desc:'',cant:1,precio:0}]}));}
  function remItem(id){setForm(f=>({...f,items:f.items.filter(i=>i.id!==id)}));}
  function updItem(id,k,v){setForm(f=>({...f,items:f.items.map(i=>i.id===id?{...i,[k]:k==='desc'?v:num(v)}:i)}));}
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Presupuestos</h2><p className="text-slate-500 text-sm">{presupuestos.length} presupuestos</p></div>
        <Btn onClick={()=>{setForm(ef(presupuestos));setModal('add');}}>+ Nuevo presupuesto</Btn>
      </div>
      <div className="flex gap-2 mb-5 flex-wrap">
        {['todos',...EST_PPTO].map(e=>{const cnt=e==='todos'?presupuestos.length:presupuestos.filter(p=>p.estado===e).length;return cnt>0?(
          <button key={e} onClick={()=>setFiltro(e)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${filtro===e?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600 hover:border-teal-300'}`}>{e==='todos'?'Todos':e} ({cnt})</button>
        ):null;})}
      </div>
      <div className="space-y-3">
        {filtered.map(p=>(
          <div key={p.id} className="bg-white border border-slate-100 rounded-xl p-4 card-hover cursor-pointer" onClick={()=>{setForm({...p,items:p.items.map(i=>({...i}))});setModal(p);}}>
            <div className="flex items-start justify-between gap-3">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap mb-1"><span className="text-xs font-mono text-slate-400">{p.numero}</span><Badge text={p.estado} cls={C.ppto[p.estado]}/></div>
                <p className="font-semibold text-slate-800">{p.clienteNombre}</p>
                <p className="text-xs text-slate-400 mt-1">📅 {p.fecha} → Vence: {p.vencimiento} · {p.condPago}</p>
              </div>
              <div className="text-right flex-shrink-0">
                <p className="text-xl font-bold text-teal-700">{pesos(totalP(p))}</p>
                <div className="flex gap-2 mt-1 justify-end">
                  <button onClick={e=>{e.stopPropagation();dup(p);}} className="text-xs text-slate-400 hover:text-slate-700">Duplicar</button>
                  <button onClick={e=>{e.stopPropagation();del(p.id);}} className="text-xs text-red-400 hover:text-red-600">Borrar</button>
                </div>
              </div>
            </div>
          </div>
        ))}
        {filtered.length===0&&<div className="text-center py-16 text-slate-400">No hay presupuestos.</div>}
      </div>
      {modal&&(
        <Modal title={modal==='add'?'Nuevo presupuesto':`Presupuesto ${form.numero}`} onClose={()=>setModal(null)} size="lg">
          <div className="grid grid-cols-2 gap-x-4">
            <FI label="Número" value={form.numero} onChange={e=>setForm({...form,numero:e.target.value})}/>
            <FS label="Estado" opts={EST_PPTO} value={form.estado} onChange={e=>setForm({...form,estado:e.target.value})}/>
            <div className="col-span-2"><FI label="Cliente *" value={form.clienteNombre} onChange={e=>setForm({...form,clienteNombre:e.target.value})}/></div>
            <FI label="Fecha emisión" type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/>
            <FI label="Vencimiento" type="date" value={form.vencimiento} onChange={e=>setForm({...form,vencimiento:e.target.value})}/>
            <div className="col-span-2"><FI label="Condición de pago" value={form.condPago} onChange={e=>setForm({...form,condPago:e.target.value})}/></div>
          </div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Ítems del presupuesto</label>
          <div className="space-y-2 mb-2">
            <div className="grid grid-cols-12 gap-1 text-xs text-slate-400 px-1"><span className="col-span-6">Descripción</span><span className="col-span-2 text-center">Cant.</span><span className="col-span-2 text-right">Precio</span><span className="col-span-1 text-right">Subtotal</span><span className="col-span-1"/></div>
            {form.items.map(item=>(
              <div key={item.id} className="grid grid-cols-12 gap-1 items-center">
                <input className="col-span-6 border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:border-teal-400 focus:outline-none bg-white" placeholder="Descripción" value={item.desc} onChange={e=>updItem(item.id,'desc',e.target.value)}/>
                <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-1.5 text-sm text-center focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={item.cant} onChange={e=>updItem(item.id,'cant',e.target.value)}/>
                <input className="col-span-2 border border-slate-200 rounded-lg px-2 py-1.5 text-sm text-right focus:border-teal-400 focus:outline-none bg-white" type="number" min="0" value={item.precio} onChange={e=>updItem(item.id,'precio',e.target.value)}/>
                <span className="col-span-1 text-sm font-medium text-teal-700 text-right">{pesos(item.cant*item.precio)}</span>
                <button onClick={()=>remItem(item.id)} className="col-span-1 text-red-400 hover:text-red-600 text-lg text-center">×</button>
              </div>
            ))}
          </div>
          <button onClick={addItem} className="text-sm text-teal-600 hover:text-teal-800 font-medium">+ Agregar ítem</button>
          <div className="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center">
            <span className="font-semibold text-slate-700">TOTAL</span>
            <span className="text-2xl font-bold text-teal-700">{pesos(form.items.reduce((s,i)=>s+i.cant*i.precio,0))}</span>
          </div>
          <div className="flex gap-3 justify-between mt-4">
            {modal!=='add'&&<Btn variant="danger" onClick={()=>{del(modal.id);setModal(null);}}>Eliminar</Btn>}
            <div className="flex gap-3 ml-auto"><Btn variant="secondary" onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={save}>Guardar</Btn></div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Tareas({tareas,setTareas}){
  const [modal,setModal]=useState(false);
  const empty={titulo:'',prioridad:'Media',tipo:'Seguimiento',estado:'Pendiente',vencimiento:'',notas:''};
  const [form,setForm]=useState(empty);
  const [filtro,setFiltro]=useState('Pendiente');
  const sorted=useMemo(()=>tareas.filter(t=>filtro==='todas'?true:t.estado===filtro).sort((a,b)=>{const p={Alta:0,Media:1,Baja:2};return (p[a.prioridad]||2)-(p[b.prioridad]||2)||(a.vencimiento||'').localeCompare(b.vencimiento||'');}),[tareas,filtro]);
  function save(){if(!form.titulo.trim())return;setTareas(p=>[...p,{...form,id:nid()}]);setModal(false);setForm(empty);}
  function toggle(id){setTareas(p=>p.map(t=>t.id===id?{...t,estado:t.estado==='Pendiente'?'Completada':'Pendiente'}:t));}
  function del(id){setTareas(p=>p.filter(t=>t.id!==id));}
  const pend=tareas.filter(t=>t.estado==='Pendiente').length;
  const altas=tareas.filter(t=>t.estado==='Pendiente'&&t.prioridad==='Alta').length;
  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-5 flex-wrap gap-3">
        <div><h2 className="text-2xl font-bold text-slate-900 syne">Tareas</h2><p className="text-slate-500 text-sm">{pend} pendientes {altas>0&&<span className="text-red-500 font-medium">· {altas} urgentes</span>}</p></div>
        <Btn onClick={()=>{setForm(empty);setModal(true);}}>+ Nueva tarea</Btn>
      </div>
      <div className="flex gap-2 mb-5 flex-wrap">
        {[{k:'Pendiente',l:`Pendientes (${pend})`},{k:'Completada',l:`Completadas (${tareas.filter(t=>t.estado==='Completada').length})`},{k:'todas',l:'Todas'}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} className={`px-4 py-1.5 rounded-full text-sm font-medium border transition ${filtro===f.k?'bg-teal-600 text-white border-teal-600':'bg-white border-slate-200 text-slate-600 hover:border-teal-300'}`}>{f.l}</button>
        ))}
      </div>
      <div className="space-y-2">
        {sorted.map(t=>(
          <div key={t.id} className={`bg-white border rounded-xl p-3 flex items-center gap-3 card-hover ${t.estado==='Completada'?'opacity-50 border-slate-100':'border-slate-100'}`}>
            <button onClick={()=>toggle(t.id)} className={`w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition ${t.estado==='Completada'?'bg-teal-500 border-teal-500 text-white':'border-slate-300 hover:border-teal-400'}`}>
              {t.estado==='Completada'&&<span className="text-xs font-bold">✓</span>}
            </button>
            <div className="flex-1 min-w-0">
              <p className={`text-sm font-medium ${t.estado==='Completada'?'line-through text-slate-400':'text-slate-700'}`}>{t.titulo}</p>
              <div className="flex items-center gap-2 mt-1 flex-wrap">
                <Badge text={t.prioridad} cls={C.prio[t.prioridad]}/>
                <Badge text={t.tipo} cls={C.ttarea[t.tipo]||'bg-slate-100 text-slate-500'}/>
                {t.vencimiento&&<span className="text-xs text-slate-400">📅 {t.vencimiento}</span>}
              </div>
            </div>
            <button onClick={()=>del(t.id)} className="text-slate-300 hover:text-red-400 text-xl transition flex-shrink-0">×</button>
          </div>
        ))}
        {sorted.length===0&&<div className="text-center py-16 text-slate-400">{filtro==='Completada'?'No hay tareas completadas.':'¡Todo al día! 🎉'}</div>}
      </div>
      {modal&&(
        <Modal title="Nueva tarea" onClose={()=>setModal(false)}>
          <div className="grid grid-cols-2 gap-x-4">
            <div className="col-span-2"><FI label="Título *" value={form.titulo} onChange={e=>setForm({...form,titulo:e.target.value})} placeholder="Ej: Llamar cliente para confirmar medición"/></div>
            <FS label="Prioridad" opts={['Alta','Media','Baja']} value={form.prioridad} onChange={e=>setForm({...form,prioridad:e.target.value})}/>
            <FS label="Tipo" opts={TIPOS_TAREA} value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}/>
            <div className="col-span-2"><FI label="Fecha límite" type="date" value={form.vencimiento} onChange={e=>setForm({...form,vencimiento:e.target.value})}/></div>
            <div className="col-span-2"><FT label="Notas" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})}/></div>
          </div>
          <div className="flex gap-3 justify-end"><Btn variant="secondary" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Agregar</Btn></div>
        </Modal>
      )}
    </div>
  );
}

/* ═══════════════════════════════
   APP PRINCIPAL
═══════════════════════════════ */
const NAV=[{id:'dashboard',label:'Dashboard',icon:'📊'},{id:'clientes',label:'Clientes',icon:'👥'},{id:'leads',label:'Leads',icon:'🔥'},{id:'presupuestos',label:'Presupuestos',icon:'📋'},{id:'obras',label:'Obras',icon:'🏗️'},{id:'tareas',label:'Tareas',icon:'✅'}];

function App(){
  const [scriptUrl,setScriptUrl]=useLs('gv_cloud_url','');
  const [appState,setAppState]=useState(scriptUrl?'loading':'setup');
  const [loadMsg,setLoadMsg]=useState('Cargando datos desde Google Sheets...');
  const [sec,setSec]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(true);

  const [clientes,setClientes]=useState([]);
  const [leads,setLeads]=useState([]);
  const [presupuestos,setPresupuestos]=useState([]);
  const [obras,setObras]=useState([]);
  const [tareas,setTareas]=useState([]);

  const [syncStatus,setSyncStatus]=useState('idle');
  const [lastSync,setLastSync]=useState('');
  const [toast,setToast]=useState(null);

  const saveTimer=useRef(null);
  const dataReady=useRef(false);

  const tareasAltas=tareas.filter(t=>t.estado==='Pendiente'&&t.prioridad==='Alta').length;

  // ── Cargar datos al inicio ──
  useEffect(()=>{
    if(scriptUrl&&appState==='loading'){
      loadData(scriptUrl);
    }
  },[]);

  async function loadData(url){
    setLoadMsg('Conectando con Google Sheets...');
    try{
      const d=await sheetsLoad(url);
      const empty=!d.clientes.length&&!d.leads.length&&!d.tareas.length;
      if(empty){
        setLoadMsg('Primera vez — cargando datos de ejemplo...');
        setClientes(INIT.clientes);setLeads(INIT.leads);setPresupuestos(INIT.presupuestos);setObras(INIT.obras);setTareas(INIT.tareas);
        await sheetsSave(url,INIT.clientes,INIT.leads,INIT.presupuestos,INIT.obras,INIT.tareas);
      } else {
        setClientes(d.clientes);setLeads(d.leads);setPresupuestos(d.presupuestos);setObras(d.obras);setTareas(d.tareas);
      }
      setLastSync(new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
      setSyncStatus('idle');
      setAppState('loaded');
      setTimeout(()=>{dataReady.current=true;},500);
    }catch(e){
      showToast('❌ Error al cargar: '+e.message,'error');
      setAppState(scriptUrl?'loaded':'setup');
    }
  }

  async function handleConnect(url){
    setScriptUrl(url);
    setAppState('loading');
    await loadData(url);
  }

  function disconnect(){
    if(confirm('¿Desconectar de Google Sheets? Vas a necesitar volver a ingresar la URL la próxima vez.')){
      setScriptUrl('');
      localStorage.removeItem('gv_cloud_url');
      setAppState('setup');
    }
  }

  // ── Auto-guardar con debounce ──
  async function autoSave(c,l,p,o,t){
    if(!dataReady.current||!scriptUrl)return;
    setSyncStatus('pending');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      setSyncStatus('saving');
      try{
        await sheetsSave(scriptUrl,c,l,p,o,t);
        setSyncStatus('idle');
        setLastSync(new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
      }catch(e){
        setSyncStatus('error');
        showToast('❌ Error al guardar: '+e.message,'error');
      }
    },3000);
  }

  // ── Wrappers de setters que disparan auto-save ──
  function setC(v){const nv=typeof v==='function'?v(clientes):v;setClientes(nv);autoSave(nv,leads,presupuestos,obras,tareas);}
  function setL(v){const nv=typeof v==='function'?v(leads):v;setLeads(nv);autoSave(clientes,nv,presupuestos,obras,tareas);}
  function setP(v){const nv=typeof v==='function'?v(presupuestos):v;setPresupuestos(nv);autoSave(clientes,leads,nv,obras,tareas);}
  function setO(v){const nv=typeof v==='function'?v(obras):v;setObras(nv);autoSave(clientes,leads,presupuestos,nv,tareas);}
  function setT(v){const nv=typeof v==='function'?v(tareas):v;setTareas(nv);autoSave(clientes,leads,presupuestos,obras,nv);}

  async function manualSave(){
    setSyncStatus('saving');
    try{
      await sheetsSave(scriptUrl,clientes,leads,presupuestos,obras,tareas);
      setSyncStatus('idle');
      setLastSync(new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
      showToast('✓ Guardado en Google Sheets');
    }catch(e){setSyncStatus('error');showToast('❌ Error: '+e.message,'error');}
  }

  function showToast(msg,type='success'){
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  }

  if(appState==='setup') return <SetupScreen onConnect={handleConnect}/>;
  if(appState==='loading') return <LoadingScreen msg={loadMsg}/>;

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',flexDirection:'column'}}>
      <CloudSyncBar syncStatus={syncStatus} lastSync={lastSync} onManualSave={manualSave} onDisconnect={disconnect}/>

      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Sidebar */}
        <aside style={{width:sideOpen?220:64,flexShrink:0,background:'#0f172a',display:'flex',flexDirection:'column',transition:'width .25s ease'}}>
          <div style={{padding:'18px 16px 14px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
            {sideOpen?(
              <div>
                <div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,lineHeight:1.2}}>GRUPO VIEW</div>
                <div style={{color:'#64748b',fontSize:11,marginTop:2}}>CRM · Cloud</div>
                {syncStatus==='idle'&&lastSync&&<div style={{color:'#0d9488',fontSize:10,marginTop:3}}>🟢 Sync {lastSync}</div>}
                {syncStatus==='saving'&&<div style={{color:'#f59e0b',fontSize:10,marginTop:3}}>⏳ Guardando...</div>}
              </div>
            ):(
              <div style={{color:'white',fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,textAlign:'center'}}>GV</div>
            )}
          </div>
          <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
            {NAV.map(n=>{
              const active=sec===n.id;
              return(
                <button key={n.id} onClick={()=>setSec(n.id)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,marginBottom:4,background:active?'#0d9488':'transparent',color:active?'white':'#94a3b8',fontSize:14,fontWeight:active?600:400,border:'none',cursor:'pointer',textAlign:'left'}}
                  onMouseEnter={e=>{if(!active){e.currentTarget.style.background='rgba(255,255,255,.06)';e.currentTarget.style.color='white';}}}
                  onMouseLeave={e=>{if(!active){e.currentTarget.style.background='transparent';e.currentTarget.style.color='#94a3b8';}}}>
                  <span style={{fontSize:16,lineHeight:1}}>{n.icon}</span>
                  {sideOpen&&<span style={{flex:1}}>{n.label}</span>}
                  {sideOpen&&n.id==='tareas'&&tareasAltas>0&&(
                    <span style={{background:'#ef4444',color:'white',fontSize:10,borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{tareasAltas}</span>
                  )}
                </button>
              );
            })}
          </nav>
          <div style={{padding:'10px 8px',borderTop:'1px solid rgba(255,255,255,.08)'}}>
            <button onClick={()=>setSideOpen(!sideOpen)} style={{width:'100%',color:'#475569',fontSize:13,background:'none',border:'none',cursor:'pointer',padding:'6px 12px',borderRadius:8,textAlign:'center'}}
              onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='#475569'}>
              {sideOpen?'◀ Colapsar':'▶'}
            </button>
          </div>
        </aside>

        {/* Main content */}
        <main style={{flex:1,overflowY:'auto',background:'#f1f5f9'}}>
          <div style={{maxWidth:1100,margin:'0 auto',padding:'28px'}}>
            {sec==='dashboard'&&<Dashboard clientes={clientes} leads={leads} presupuestos={presupuestos} obras={obras} tareas={tareas} setSeccion={setSec}/>}
            {sec==='clientes'&&<Clientes clientes={clientes} setClientes={setC}/>}
            {sec==='leads'&&<Leads leads={leads} setLeads={setL}/>}
            {sec==='presupuestos'&&<Presupuestos presupuestos={presupuestos} setPresupuestos={setP}/>}
            {sec==='obras'&&<Obras obras={obras} setObras={setO}/>}
            {sec==='tareas'&&<Tareas tareas={tareas} setTareas={setT}/>}
          </div>
        </main>
      </div>

      {/* Toast */}
      {toast&&(
        <div className="slide-up" style={{position:'fixed',bottom:24,right:24,background:toast.type==='error'?'#ef4444':'#0d9488',color:'white',padding:'12px 20px',borderRadius:12,fontSize:14,fontWeight:500,zIndex:9999,boxShadow:'0 8px 24px rgba(0,0,0,.2)'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
